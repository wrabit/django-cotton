{% load custom_tags force_escape %}

<c-vars
    language="django"
    ignore_syntax_choice
    :hide_label="False"
    pre_class="flex-1 flex flex-col !leading-[1.8rem] !p-0 !m-0 rounded-none !text-[14px]"
    code_class="flex-1 !pb-4 !px-6 !m-0 !bg-zinc-800 dark:!bg-zinc-800/40"
/>

<div class="group relative flex-1 flex flex-col justify-start w-full overflow-hidden rounded-lg"
     x-data="{% verbatim %}{
        get currentCode() {
            const htmlCode = $refs.htmlCode;
            const templateCode = $refs.templateCode;
            if ($store.syntaxPreference === 'html' && htmlCode) {
                return htmlCode.innerText;
            } else if (templateCode) {
                return templateCode.innerText;
            }
            return '';
        },
        copy() {
            const text = this.currentCode;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text)
            } else {
                this.unsecuredCopyToClipboard(text)
            }
        },
        unsecuredCopyToClipboard(text) {
          const textArea = document.createElement('textarea');
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
          } catch (err) {
            console.error('Unable to copy to clipboard', err);
          }
          document.body.removeChild(textArea);
        }
    }{% endverbatim %}"
    x-init="{% verbatim %}
        $watch('$store.syntaxPreference', () => {
            setTimeout(() => hljs.highlightAll(), 50);
        });
    {% endverbatim %}"
>
    {% if label and not hide_label %}<div class="absolute left-0 top-0 text-left w-full px-5 pt-3 text-sm text-zinc-500 font-semibold">{{ label }}</div>{% endif %}

    <!-- Top-right controls: syntax switcher + copy button -->
    <div class="absolute right-0 top-0 pt-3 pr-5 flex items-center gap-3">
        {% if "<c-" in slot and not ignore_syntax_choice %}
            <div class="inline-flex rounded-lg gap-0.5">
                <!-- Buttons with individual backgrounds -->
                <button
                    @click="$store.syntaxPreference = 'html'"
                    class="px-2 py-0 text-[12px] transition-all duration-200 rounded-md"
                    :class="$store.syntaxPreference === 'html'
                        ? 'bg-teal-60020 text-teal-500 '
                        : 'text-zinc-400 hover:text-zinc-300'"
                >
                    HTML
                </button>
                <button
                    @click="$store.syntaxPreference = 'template'"
                    class="px-2 py-0 text-[12px] transition-all duration-200 rounded-md"
                    :class="$store.syntaxPreference === 'template'
                        ? 'bg-teal-60020 text-teal-500 '
                        : 'text-zinc-400 hover:text-zinc-300'"
                >
                    Native
                </button>
            </div>
        {% endif %}
        <!-- Copy button - always visible -->
        <button @click.prevent="copy" class="transition-opacity text-zinc-500 duration-200 hover:text-zinc-400">
            <c-icons.copy class="size-[1.1rem]" />
        </button>
    </div>

    {% if "<c-" in slot and not ignore_syntax_choice %}
        <!-- HTML Syntax Version -->
        <div x-show="$store.syntaxPreference === 'html'">
            <pre class="{{ pre_class }}"><code x-ref="htmlCode" class="language-{{ language }} {{ code_class }} !pt-10">{{ slot|strip }}</code></pre>
        </div>

        <!-- Template Tag Syntax Version -->
        <div x-show="$store.syntaxPreference === 'template'">
            <pre class="{{ pre_class }}"><code x-ref="templateCode" class="language-{{ language }} {{ code_class }} !pt-10">{{ slot|strip|to_template_tags }}</code></pre>
        </div>
    {% else %}
        <!-- No Cotton tags OR ignore-syntax-choice is set - show single static version -->
        <pre class="{{ pre_class }}"><code x-ref="htmlCode" class="language-{{ language }} {{ code_class }} {% if label and not hide_label %}!pt-10{% else %}!pt-4{% endif %}">{{ slot|strip }}</code></pre>
    {% endif %}

    {% if preview %}
        <div class="text-base px-6 py-6 prose-headings:text-zinc-800 bg-white dark:bg-zinc-50 rounded-b border-l border-r border-b">
            <div class="text-sm text-zinc-400 font-semibold uppercase tracking-wider pb-3">preview</div>
            {{ preview }}
        </div>
    {% endif %}
</div>
