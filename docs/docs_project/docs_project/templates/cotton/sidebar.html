<div class="pb-6">
    <!-- Syntax Preference Switcher -->
    <div class="flex items-center space-x-1.5 mb-2">
        <div class="text-xs font-semibold uppercase tracking-wider text-zinc-500">docs default syntax</div>
        <c-ui.tooltip position="bottom" :offset="18" :interactive="True">
            <button class="text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-300">
                <c-tablericon.info-circle class="size-4" stroke_width="2" />
            </button>
            <c-slot name="content">
                <div class="space-y-2 text-xs">
                    <div>
                        <span class="font-semibold">&lt;c&gt; tags:</span> Snippets in HTML-like syntax.
                    </div>
                    <div>
                        <span class="font-semibold">Native:</span> Snippets in Django template syntax.
                    </div>
                </div>
                <div class="mt-2 pt-2 border-t border-zinc-200 dark:border-zinc-700">
                    <a href="{% url 'fundamentals' %}#tag-syntax" class="text-accent-content text-xs font-medium">
                        More info
                    </a>
                </div>
            </c-slot>
        </c-ui.tooltip>
    </div>
    <div class="mb-3 pb-3" x-data>
        <div class="inline-flex rounded-lg gap-0.5 font-mono">
            <button
                @click="$store.syntaxPreference = 'html'"
                class="cursor-pointer px-2 py-0.5 text-[12px] border border-transparent transition-all duration-200 rounded-md min-w-[2rem]"
                :class="$store.syntaxPreference === 'html'
                    ? 'bg-zinc-700 text-white !border-zinc-500 '
                    : 'text-zinc-400 hover:text-zinc-300 border-transparent'"
            >
                &lt;c&gt; tags
            </button>
            <button
                @click="$store.syntaxPreference = 'template'"
                class="cursor-pointer px-2 py-0.5 text-[12px] border border-transparent transition-all duration-200 rounded-md min-w-[2rem]"
                :class="$store.syntaxPreference === 'template'
                    ? 'bg-zinc-700 text-white !border-zinc-500 '
                    : 'text-zinc-400 hover:text-zinc-300 border-transparent'"
            >
                Native
            </button>
        </div>
    </div>

    <c-sidebar.menu>
        <c-slot name="title">Getting Started</c-slot>
        <c-sidebar.link title="Thinking in Components" url="{% url 'thinking-in-components' %}" />
        <c-sidebar.link title="Quickstart" url="{% url 'quickstart' %}" />
        <c-sidebar.link title="Components" url="{% url 'components' %}" />
        <c-sidebar.link title="Fundamentals" url="{% url 'fundamentals' %}" />
        <c-sidebar.link title="Configuration" url="{% url 'configuration' %}" />
    </c-sidebar.menu>
    <c-sidebar.menu>
        <c-slot name="title">Tutorials</c-slot>
        <c-sidebar.link title="Form Inputs" url="{% url 'form-fields' %}" />
        <c-sidebar.link title="Tabs with Alpine.js" url="{% url 'alpine-js' %}" />
        <c-sidebar.link title="Composing Layouts" url="{% url 'layouts' %}" />
        <c-sidebar.link title="Cotton as SVG Icons" url="{% url 'icons' %}" />
    </c-sidebar.menu>
    <c-sidebar.menu>
        <c-slot name="title">Usage Patterns</c-slot>
        <c-sidebar.link title="Component Variants" url="{% url 'variants' %}" />
        <c-sidebar.link title="Attribute Proxying" url="{% url 'attribute-proxying' %}" />
        <c-sidebar.link title="Compound Components" url="{% url 'index-component' %}" />
        <c-sidebar.link title="HTMX Integration" url="{% url 'htmx-examples' %}" />
    </c-sidebar.menu>
</div>
