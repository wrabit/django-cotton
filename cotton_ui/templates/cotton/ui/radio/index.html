<c-vars
    value=""
    label=""
    description=""
    icon=""
    name=""
    :disabled="False"
    :show_indicator="True"
    :accent="True"
    :checked="False"
/>

<label
    role="radio"
    data-value="{{ value }}"
    {% if checked %}data-checked="true"{% endif %}
    :aria-checked="isSelected('{{ value }}').toString()"
    :aria-disabled="{% if disabled %}true{% else %}false{% endif %}"
    :tabindex="{% if disabled %}'-1'{% else %}hasRovingTabindex('{{ value }}') ? '0' : '-1'{% endif %}"
    @click="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.enter.stop.prevent="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.space.stop.prevent="{% if not disabled %}select('{{ value }}'){% endif %}"
    @keydown.down.prevent="selectNext()"
    @keydown.up.prevent="selectPrevious()"
    @keydown.right.prevent="selectNext()"
    @keydown.left.prevent="selectPrevious()"
    class="flex items-start gap-3 cursor-pointer {% if disabled %}opacity-50 cursor-not-allowed{% endif %}"
    x-bind:class="(() => {
        const variant = $el.closest('[data-variant]')?.dataset.variant || 'default';
        const classes = [];

        if (variant === 'default') {
            // Base layout classes are static, no dynamic classes needed for default
        } else if (variant === 'segmented') {
            classes.push('px-4', 'py-2', 'font-medium', 'transition-colors', 'border-r', 'border-zinc-200', 'dark:border-zinc-700', 'last:border-r-0', 'first:rounded-l-lg', 'last:rounded-r-lg');
            if ($data.isSelected('{{ value }}')) {
                classes.push('bg-zinc-100', 'dark:bg-zinc-800');
            } else {
                classes.push('hover:bg-zinc-50', 'dark:hover:bg-zinc-700');
            }
        } else if (variant === 'cards') {
            classes.push('flex', 'flex-1', 'gap-4', 'rounded-lg', 'border-2', 'p-4', 'transition-all');
            if ($data.isSelected('{{ value }}')) {
                {% if accent %}
                classes.push('border-accent', 'bg-accent/5');
                {% else %}
                classes.push('border-zinc-900', 'dark:border-zinc-100', 'bg-zinc-50', 'dark:bg-zinc-800');
                {% endif %}
            } else {
                classes.push('border-zinc-200', 'dark:border-zinc-700');
            }
        }

        return classes;
    })()"
>
    {% comment %}Hidden native radio input for form submission{% endcomment %}
    <input
        type="radio"
        name="{{ name }}"
        value="{{ value }}"
        :checked="isSelected('{{ value }}')"
        {% if disabled %}disabled{% endif %}
        {% if checked %}checked{% endif %}
        class="sr-only"
    />

    {% comment %}Default variant structure{% endcomment %}
    {% if slot %}
        {{ slot }}
    {% else %}
        {% comment %}Radio indicator (default and cards variants only, hidden for segmented){% endcomment %}
        <div x-show="{% if show_indicator %}(() => { const v = $el.closest('[data-variant]')?.dataset.variant || 'default'; return v !== 'segmented'; })(){% else %}false{% endif %}" class="flex items-center h-5">
            <div class="flex items-center justify-center w-[1.125rem] h-[1.125rem] rounded-full border transition-all shadow-sm bg-white dark:bg-white/10 border-zinc-300 dark:border-white/10">
                <div class="size-2.5 rounded-full transition-opacity"
                     :class="{
                         'opacity-100': isSelected('{{ value }}'),
                         'opacity-0': !isSelected('{{ value }}'),
                         {% if accent %}
                         'bg-accent': isSelected('{{ value }}')
                         {% else %}
                         'bg-zinc-900 dark:bg-zinc-100': isSelected('{{ value }}')
                         {% endif %}
                     }">
                </div>
            </div>
        </div>

        {% comment %}Icon for segmented variant{% endcomment %}
        {% if icon %}
            <span class="flex items-center gap-2">
                {% comment %}Icon placeholder - replace with actual icon component{% endcomment %}
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                {% if label %}{{ label }}{% endif %}
            </span>
        {% elif label %}
            <div class="flex-1">
                <div class="textfont-medium text-zinc-900 dark:text-zinc-100">
                    {{ label }}
                </div>
                {% if description %}
                    <div class="text-zinc-600 dark:text-zinc-400 mt-1">
                        {{ description }}
                    </div>
                {% endif %}
            </div>
        {% endif %}
    {% endif %}
</label>
