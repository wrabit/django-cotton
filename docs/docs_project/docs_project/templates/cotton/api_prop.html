<c-vars name type :options="[]" default description />

<tr class="py-5 !border-b-zinc-300 dark:!border-b-gray-700">
    <td><code class="!bg-teal-500/20 !text-teal-500 text-[14px] font-bold">{{ name }}</code></td>
    <td>{{ description }}</td>
    <td>{{ type }}</td>
    <td>
        {% if options_content %}
            {{ options_content }}
        {% elif options %}
            <div class="flex flex-col gap-1">
                {% for option in options %}<div><code class="!boder !bg-gray-100 dark:!bg-zinc-700 dark:!text-zinc-400 !text-gray-600">{{ option }}</code></div>{% endfor %}
            </div>
        {% else %}
            <span class="opacity-50">&mdash;</span>
        {% endif %}
        {#    {% if not forloop.last %}, {% endif %}#}
    </td>
    <td>{{ default }}</td>
</tr>
