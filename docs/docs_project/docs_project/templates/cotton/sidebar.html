<div class="pb-6">
    <!-- Syntax Preference Switcher -->
    <div class="flex items-center space-x-1.5 mb-4">
        <div class="text-xs font-semibold uppercase tracking-wider text-zinc-500">docs default syntax</div>
        <div class="relative" x-data="{ showPopover: false }" @mouseenter="showPopover = true" @mouseleave="showPopover = false">
            <button
                class="text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-300 transition-colors"
            >
                <c-tablericon.info-circle class="size-4" stroke_width="2" />
            </button>
            <div
                x-show="showPopover"
                x-transition
                x-cloak
                class="absolute left-0 top-6 w-56 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg shadow-lg p-3 text-xs text-zinc-600 dark:text-zinc-400 z-50"
            >
                <div class="space-y-2">
                    <div>
                        <span class="font-semibold">Cotton:</span> Snippets will be shown in HTML-like syntax.
                    </div>
                    <div>
                        <span class="font-semibold">Native:</span> Snippets will be shown in native Django template syntax.
                    </div>
                </div>
                <div class="mt-3 pt-3 border-t border-zinc-200 dark:border-zinc-700">
                    <a href="{% url 'usage-patterns' %}#tag-syntax" class="text-accent-content text-xs font-medium">
                        More info
                    </a>
                </div>
            </div>
        </div>
    </div>
    <div class="mb-3 pb-3" x-data>
        <div class="flex w-full bg-zinc-100 dark:bg-zinc-800 rounded-lg p-0.5 gap-0.5">
            <button
                @click="$store.syntaxPreference = 'html'"
                class="w-full px-2.5 py-1 text-sm transition-all duration-200 rounded-md min-w-[2rem]"
                :class="$store.syntaxPreference === 'html'
                    ? 'bg-accent/20 text-accent-content font-semibold'
                    : 'text-zinc-700 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100'"
            >
                <span>cotton</span>&nbsp;&nbsp;<span>&lt;/&gt;</span>
            </button>
            <button
                @click="$store.syntaxPreference = 'template'"
                class="w-full px-2.5 py-1 text-sm transition-all duration-200 rounded-md min-w-[2rem]"
                :class="$store.syntaxPreference === 'template'
                    ? 'bg-accent/20 text-accent-content font-semibold'
                    : 'text-zinc-700 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100'"
            >
                <span>native</span>&nbsp;&nbsp;<span>&#37;}</span>
            </button>
        </div>
    </div>

    <c-sidebar.menu>
        <c-slot name="title">Getting Started</c-slot>
        <c-sidebar.link title="Quickstart" url="{% url 'quickstart' %}" />
        <c-sidebar.link title="Components" url="{% url 'components' %}" />
        <c-sidebar.link title="Usage Patterns" url="{% url 'usage-patterns' %}" />
        <c-sidebar.link title="Configuration" url="{% url 'configuration' %}" />
    </c-sidebar.menu>
    <c-sidebar.menu>
        <c-slot name="title">Examples</c-slot>
        <c-sidebar.link title="Form Inputs" url="{% url 'form-fields' %}" />
        <c-sidebar.link title="Tabs with Alpine.js" url="{% url 'alpine-js' %}" />
        <c-sidebar.link title="Layouts" url="{% url 'layouts' %}" />
        <c-sidebar.link title="Icons" url="{% url 'icons' %}" />
    </c-sidebar.menu>
    <c-sidebar.menu>
        <c-slot name="title">More</c-slot>
        <c-sidebar.link title="Django Template Partials" url="{% url 'django-template-partials' %}" />
    </c-sidebar.menu>
</div>
