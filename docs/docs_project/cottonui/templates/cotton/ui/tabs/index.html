<c-vars
    :default_tab="None"
    variant="default"
    size="md"
    :accent="True"
/>

<div x-data="{
    tabs: [],
    activeTab: '{{ default_tab|default:'' }}',
    register(name, icon) {
        this.tabs.push({name: name, icon: icon});
        if (!this.activeTab && this.tabs.length === 1) {
            this.activeTab = name;
        }
    },
    isActive(name) {
        return this.activeTab === name;
    }
}"
class="w-full space-y-4"
{{ attrs }}>

    <!-- Tab List -->
    <div class="
        flex items-center
        {% if variant == 'segmented' %}
            bg-zinc-100 dark:bg-zinc-800 p-1 rounded-lg
        {% else %}
            border-b border-zinc-200 dark:border-zinc-700 w-full
        {% endif %}
        overflow-x-auto no-scrollbar
    ">
        <template x-for="tab in tabs" :key="tab.name">
            <button type="button"
                @click="activeTab = tab.name"
                class="
                    inline-flex items-center justify-center whitespace-nowrap transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2
                    disabled:pointer-events-none disabled:opacity-50
                    {% if size == 'sm' %}text-xs px-2.5 py-1
                    {% elif size == 'lg' %}text-base px-4 py-2
                    {% else %}text-sm px-3 py-1.5{% endif %}

                    {% if variant == 'segmented' %}
                        rounded-md font-medium
                    {% else %}
                        border-b-2 -mb-px font-medium rounded-t-md
                    {% endif %}
                "
                :class="{
                    {% if variant == 'segmented' %}
                        'bg-white text-zinc-950 shadow-sm dark:bg-zinc-950 dark:text-zinc-50': isActive(tab.name),
                        'text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100': !isActive(tab.name)
                    {% else %}
                        {% if accent %}
                            'border-accent text-accent': isActive(tab.name),
                        {% else %}
                            'border-zinc-900 text-zinc-900 dark:border-zinc-100 dark:text-zinc-100': isActive(tab.name),
                        {% endif %}
                        'border-transparent text-zinc-500 hover:border-zinc-300 hover:text-zinc-700 dark:text-zinc-400 dark:hover:border-zinc-600 dark:hover:text-zinc-200': !isActive(tab.name)
                    {% endif %}
                }"
            >
                <span x-show="tab.icon" x-html="tab.icon" class="mr-2 [&>svg]:size-4 flex items-center"></span>
                <span x-text="tab.name"></span>
            </button>
        </template>
    </div>

    <!-- Panels -->
    <div class="mt-2 ring-offset-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-950 focus-visible:ring-offset-2 dark:ring-offset-zinc-950 dark:focus-visible:ring-300">
        {{ slot }}
    </div>
</div>
