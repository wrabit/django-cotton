<c-vars
    label=""
    description=""
    description_trailing=""
    error=""
    badge=""
    form
    name=""
    left_addon
    right_addon
/>

{% if label or description or description_trailing or error %}
    <c-ui.field
        label="{{ label }}"
        description="{{ description }}"
        description_trailing="{{ description_trailing }}"
        error="{{ error }}"
        badge="{{ badge }}"
        :form="form"
        name="{{ name }}">

        <c-ui.input.impl
            name="{{ name }}"
            left_addon="{{ left_addon }}"
            right_addon="{{ right_addon }}"
            :attrs="attrs"
        />
    </c-ui.field>
{% else %}
    <c-ui.input.impl
        name="{{ name }}"
        left_addon="{{ left_addon }}"
        right_addon="{{ right_addon }}"
        :attrs="attrs"
    />
{% endif %}
