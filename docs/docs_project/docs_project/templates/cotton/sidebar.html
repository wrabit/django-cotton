<div class="pb-6">
    <!-- Syntax Preference Switcher -->
    <div class="flex items-center space-x-1.5 mb-2">
        <div class="text-xs font-semibold uppercase tracking-wider text-zinc-500">docs default syntax</div>
        <c-ui.tooltip position="bottom" :offset="18">
            <button class="text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-300">
                <c-tablericon.info-circle class="size-4" stroke_width="2" />
            </button>
            <c-slot name="content">
                <div class="space-y-2 text-xs">
                    <div>
                        <span class="font-semibold">Cotton:</span> Snippets in HTML-like syntax.
                    </div>
                    <div>
                        <span class="font-semibold">Native:</span> Snippets in Django template syntax.
                    </div>
                </div>
                <div class="mt-2 pt-2 border-t border-zinc-200 dark:border-zinc-700">
                    <a href="{% url 'usage-patterns' %}#tag-syntax" class="text-accent-content text-xs font-medium">
                        More info
                    </a>
                </div>
            </c-slot>
        </c-ui.tooltip>
    </div>
    <div class="mb-3 pb-3" x-data>
        <div class="flex w-full border border-zinc-200 dark:border-zinc-700 rounded-lg overflow-hidden gap-0.5">
            <button
                @click="$store.syntaxPreference = 'html'"
                class="cursor-pointer w-full px-2.5 py-1 text-sm min-w-8"
                :class="$store.syntaxPreference === 'html'
                    ? 'bg-zinc-500/20 text-zinc-700 dark:text-zinc-300 font-semibold'
                    : 'text-zinc-700 dark:text-zinc-400'"
            >
                <span>cotton</span>&nbsp;&nbsp;<span :class="$store.syntaxPreference === 'html' ? 'text-accent-content' : ''">&lt;/&gt;</span>
            </button>
            <button
                @click="$store.syntaxPreference = 'template'"
                class="cursor-pointer w-full px-2.5 py-1 text-sm min-w-8"
                :class="$store.syntaxPreference === 'template'
                    ? 'bg-zinc-500/20 text-zinc-700 dark:text-zinc-300 font-semibold'
                    : 'text-zinc-700 dark:text-zinc-400'"
            >
                <span>native</span>&nbsp;&nbsp;<span :class="$store.syntaxPreference === 'template' ? 'text-accent-content' : ''">&#37;}</span>
            </button>
        </div>
    </div>

    <c-sidebar.menu>
        <c-slot name="title">Getting Started</c-slot>
        <c-sidebar.link title="Quickstart" url="{% url 'quickstart' %}" />
        <c-sidebar.link title="Components" url="{% url 'components' %}" />
        <c-sidebar.link title="Usage Patterns" url="{% url 'usage-patterns' %}" />
        <c-sidebar.link title="Configuration" url="{% url 'configuration' %}" />
    </c-sidebar.menu>
    <c-sidebar.menu>
        <c-slot name="title">Examples</c-slot>
        <c-sidebar.link title="Form Inputs" url="{% url 'form-fields' %}" />
        <c-sidebar.link title="Tabs with Alpine.js" url="{% url 'alpine-js' %}" />
        <c-sidebar.link title="Layouts" url="{% url 'layouts' %}" />
        <c-sidebar.link title="Icons" url="{% url 'icons' %}" />
    </c-sidebar.menu>
    <c-sidebar.menu>
        <c-slot name="title">More</c-slot>
        <c-sidebar.link title="Django Template Partials" url="{% url 'django-template-partials' %}" />
    </c-sidebar.menu>
</div>
