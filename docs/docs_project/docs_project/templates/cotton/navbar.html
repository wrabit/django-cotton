<div x-data="{
        isOpen: false,
        scrollPosition: 0,
        toggleMenu() {
            this.isOpen = !this.isOpen;
            if (this.isOpen) {
                this.scrollPosition = window.pageYOffset;
                document.body.style.overflow = 'hidden';
                document.body.style.position = 'fixed';
                document.body.style.top = `-${this.scrollPosition}px`;
                document.body.style.width = '100%';
            } else {
                document.body.style.overflow = '';
                document.body.style.position = '';
                document.body.style.top = '';
                document.body.style.width = '';
                window.scrollTo(0, this.scrollPosition);
            }
        }
    }"
    @keydown.escape.window="isOpen && toggleMenu()">

    <!-- Fixed navbar -->
    <header class="fixed top-0 z-50 w-full bg-white/80 backdrop-blur-md border-b border-zinc-200 dark:bg-zinc-900/80 dark:border-zinc-800">
        <div class="py-2 px-5 max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex item-center items-center">
                <!-- Mobile menu button-->
                <button @click="toggleMenu()"
                        type="button"
                        class="sm:hidden relative inline-flex items-center justify-center rounded-md pr-3 text-gray-400 focus:outline-none focus:ring-0"
                        :aria-expanded="isOpen">
                    <span class="sr-only">Toggle menu</span>
                    <svg x-show="!isOpen" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
                    </svg>
                    <svg x-show="isOpen" x-cloak class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>

                <a href="/" class="flex item-center items-center space-x-1.5">
                    <div class="flex items-center space-x-1">
                        <span class="font-semibold text-[1.75rem] ml-1.5 text-zinc-950 dark:text-gray-100 tracking-tight">cotton</span>
                        <div class="text-gray-700 dark:text-white text-sm opacity-50 mt-0.5 px-1">for</div>
                        <c-icons.django class="h-[1.2rem] text-teal-600 mt-1.5" />
                    </div>
                </a>

                <div class="hidden sm:flex items-center h-full space-x-1 ml-6">
                    <c-navbar.nav-item url="{% url 'home' %}" active-exact active-startswith="/docs/">
                        <c-icons.book class="size-4 mr-1.5" />
                        Core
                    </c-navbar.nav-item>
                    <c-navbar.nav-item url="{% url 'ui' %}" active-startswith="/ui">
                        <c-icons.blocks class="size-4 mr-1.5" />
                        UI
                    </c-navbar.nav-item>
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <a href="#" @click.prevent="toggleDark" x-data="{
                        'dark': false,
                        init() {
                            this.dark = document.documentElement.classList.contains('dark')
                        },
                        toggleDark() {
                            this.dark = !this.dark
                            document.documentElement.classList.toggle('dark')
                            localStorage.theme = this.dark ? 'dark' : 'light'
                        }
                    }">
                    <c-icons.sun class="size-6 text-yellow-900/40 dark:text-zinc-500" />
                </a>
                <a href="https://github.com/wrabit/django-cotton" target="_blank" class="text-yellow-900/40 dark:text-zinc-500 flex items-center space-x-2">
                    <c-icons.github class="size-5" />
                </a>
                <a href="https://discord.gg/4x8ntQwHMe" target="_blank" class="text-yellow-900/40 dark:text-zinc-500 flex items-center space-x-2">
                    <c-icons.discord class="size-6" />
                </a>
            </div>
        </div>
    </header>

    <!-- Mobile menu overlay -->
    <div x-show="isOpen"
         x-cloak
         @click="toggleMenu()"
         class="fixed inset-0 bg-black/50 z-40 sm:hidden"></div>

    <!-- Mobile menu -->
    <nav x-show="isOpen"
         x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-4"
         class="fixed top-[73px] left-0 right-0 bottom-0 z-50 bg-white dark:bg-zinc-900 overflow-y-auto sm:hidden"
         style="-webkit-overflow-scrolling: touch;">
        <div class="px-5 py-6">
            <!-- Mobile nav links -->
            <div class="flex flex-col gap-2 mb-6 pb-6 border-b border-zinc-200 dark:border-zinc-800">
                <a href="{% url 'home' %}"
                   class="flex items-center gap-2 px-3 py-2 rounded-md font-medium
                   {% if request.path == '/' or request.path|startswith:'/docs/' %}
                       bg-accent text-accent-foreground
                   {% else %}
                       text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800
                   {% endif %}">
                    <c-icons.book class="size-5" />
                    Core
                </a>
                <a href="{% url 'ui' %}"
                   class="flex items-center gap-2 px-3 py-2 rounded-md font-medium
                   {% if request.path|startswith:'/ui' %}
                       bg-accent text-accent-foreground
                   {% else %}
                       text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800
                   {% endif %}">
                    <c-icons.blocks class="size-5" />
                    UI
                </a>
            </div>

            <!-- Sidebar content - show UI sidebar on /ui routes, regular sidebar otherwise -->
            {% if request.path|startswith:"/ui" %}
                <c-ui-docs.sidebar />
            {% else %}
                <c-sidebar />
            {% endif %}
        </div>
    </nav>
</div>
