<c-vars url :active-exact="False" active-startswith />

<a
    href="{{ url }}"
    class="py-1 mb-[-3px] flex px-3 items-center rounded-full font-semibold
    {% if active_startswith and request.path|startswith:active_startswith or active_exact and request.path == url %}
        text-teal-500 darkbg-zinc-500/20 border2 border-teal-500/40 bg-teal-500/15
    {%  else %}
        text-zinc-400 border-transparent
    {% endif %}
">
    {{ slot }}
</a>
