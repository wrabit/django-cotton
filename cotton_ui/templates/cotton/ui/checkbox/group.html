<c-vars
    name=""
    label=""
    description=""
    description_trailing=""
    error=""
    badge=""
    form
    :values="[]"
    variant="default"
    class=""
/>

{% if label or description or description_trailing or error %}
    <c-ui.field
        label="{{ label }}"
        description="{{ description }}"
        description_trailing="{{ description_trailing }}"
        error="{{ error }}"
        badge="{{ badge }}"
        :form="form"
        name="{{ name }}">
        <fieldset
            x-data='checkbox("{{ name }}", {{ values|json_encode }})'
            role="group"
            data-variant="{{ variant }}"
            {% if variant == 'default' %}
                class="space-y-3"
            {% elif variant == 'buttons' %}
                class="inline-flex"
            {% elif variant == 'cards' %}
                class="flex gap-4"
            {% endif %}
            {{ attrs }}
        >
            <div
                {% if variant == 'default' %}
                    class="space-y-3 {{ class }}"
                {% elif variant == 'buttons' %}
                    class="inline-flex rounded-lg border border-zinc-200 dark:border-zinc-700 {{ class }}"
                {% elif variant == 'cards' %}
                    class="flex gap-4 w-full {{ class }}"
                {% endif %}
            >
                {{ slot }}
            </div>
        </fieldset>
    </c-ui.field>
{% else %}
    <fieldset
        x-data='checkbox("{{ name }}", {{ values|json_encode }})'
        role="group"
        data-variant="{{ variant }}"
        {% if variant == 'default' %}
            class="space-y-3"
        {% elif variant == 'buttons' %}
            class="inline-flex"
        {% elif variant == 'cards' %}
            class="flex gap-4"
        {% endif %}
        {{ attrs }}
    >
        <div
            {% if variant == 'default' %}
                class="space-y-3 {{ class }}"
            {% elif variant == 'buttons' %}
                class="inline-flex rounded-lg border border-zinc-200 dark:border-zinc-700 {{ class }}"
            {% elif variant == 'cards' %}
                class="flex gap-4 w-full {{ class }}"
            {% endif %}
        >
            {{ slot }}
        </div>
    </fieldset>
{% endif %}
