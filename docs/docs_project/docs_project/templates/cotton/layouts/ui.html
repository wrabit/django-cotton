<c-layouts.base>
    <div class="mx-auto max-w-7xl grid sm:grid-cols-[200px_auto] lg:grid-cols-[230px_auto_250px] flex-1 px-5 h-full">
        <div class="sticky top-20 h-[calc(100vh-5rem)] overflow-y-auto pr-10 border-zinc-200 dark:border-zinc-800 hidden sm:block">
            <c-ui-docs.sidebar />
        </div>
        <div class="overflow-auto pb-10">
            <c-layouts.prose-container>
                {{ slot }}
            </c-layouts.prose-container>
        </div>
        <div class="relative h-full pl-10 border-opacity-10 hidden lg:block">
            {% if page_index %}
                <div class="sticky top-[68px] pt-0 pb-10 text-sm">
                    <c-sidebar.heading>On this page</c-sidebar.heading>
                    <ul class="ml-0 pl-0 mt-4">
                        {{ page_index }}
                    </ul>
                </div>
            {% endif %}
        </div>
    </div>
</c-layouts.base>
