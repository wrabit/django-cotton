<c-layouts.base>
    <div class="mx-auto max-w-8xl grid sm:grid-cols-[200px_auto] lg:grid-cols-[230px_auto_250px] flex-1 px-5 h-full">
        <div class="relative h-full pr-10 border-r-yellow-800 border-opacity-10 hidden sm:block">
            <c-ui-docs.sidebar />
        </div>
        <div class="overflow-auto flex-1 h-full py-6
            max-w-[760px] mx-auto px-0 md:px-5
            prose
            prose-a:text-teal-600
            prose-h2:text-3xl
            prose-h3:text-2xl
            prose-headings:text-[#1a384a]
            prose-headings:font-semibold
            prose-headings:font-light
            dark:prose-headings:text-white

            text-[#1a384a] dark:text-white dark:text-opacity-70
        ">
            {{ slot }}
        </div>
        <div class="relative h-full pl-10 border-opacity-10 hidden lg:block">
            {% if page_index %}
                <div class="sticky top-[68px] pt-0 pb-10">
                    <c-sidebar-heading>On this page</c-sidebar-heading>
                    <ul class="ml-0 pl-0 mt-4">
                        {{ page_index }}
                    </ul>
                </div>
            {% endif %}
        </div>
    </div>
</c-layouts.base>
