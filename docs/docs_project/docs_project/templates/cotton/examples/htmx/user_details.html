<div {{ attrs }} class="not-prose">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-4">{{ name }}</h2>
    <p class="text-gray-600 dark:text-gray-400 mb-2">Email: {{ email }}</p>
    <p class="text-gray-600 dark:text-gray-400 mb-4">Role: {{ role }}</p>
    <button
        @click="$dispatch('close-modal')"
        class="px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 rounded transition-colors"
    >
        Close
    </button>
</div>
