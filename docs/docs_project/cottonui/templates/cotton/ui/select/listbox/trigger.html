<c-vars
    placeholder="Select an option"
    size=""
    :size_classes="{
        'sm': 'text-sm px-3 py-1.5',
        '': 'text-sm px-3 py-2',
        'lg': 'text-base px-4 py-2.5'
    }"
/>

<button
    type="button"
    @click="toggle()"
    :disabled="disabled"
    {{ attrs }}
    class="flex items-center text-left justify-between w-full rounded-lg border transition-colors
           {{ size_classes|get_item:size }}
           bg-white dark:bg-zinc-900
           border-zinc-300 dark:border-zinc-700
           hover:border-zinc-400 dark:hover:border-zinc-600
           focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 dark:focus:ring-offset-zinc-900
           disabled:opacity-50 disabled:cursor-not-allowed"
    :class="{ 'border-accent': open }"
>
    <div class="flex items-center gap-3 flex-1 min-w-0">
        <!-- Icon from selected option -->
        <span
            x-show="selectedOption?.icon"
            class="flex-shrink-0 w-5 h-5 text-zinc-400 dark:text-zinc-500"
            x-html="selectedOption?.icon"
            style="display: none;"
        ></span>

        <!-- Label and optional description -->
        <div class="flex-1 min-w-0">
            <span
                class="truncate block"
                :class="{ 'text-zinc-500 dark:text-zinc-400': !selected }"
                x-text="selectedLabel || '{{ placeholder }}'"
            ></span>
            <span
                x-show="selectedOption?.description"
                class="text-xs text-zinc-500 dark:text-zinc-400 truncate block"
                x-text="selectedOption?.description"
                style="display: none;"
            ></span>
        </div>
    </div>

    <svg
        class="w-4 h-4 ml-2 text-zinc-400 transition-transform flex-shrink-0"
        :class="{ 'rotate-180': open }"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
    >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
    </svg>
</button>
