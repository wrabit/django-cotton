<c-vars name href author="" description="" />

{% comment %}A credited ecosystem entry: name (links to its home) + author, a one-line
description, and a row of repo/registry links passed as the default slot.{% endcomment %}
<div class="py-4">
    <div class="flex flex-wrap items-baseline gap-x-2 gap-y-1">
        <a href="{{ href }}" target="_blank" rel="noopener" class="no-underline font-semibold text-zinc-900 dark:text-zinc-100 hover:text-accent-content transition-colors">{{ name }}</a>
        {% if author %}<span class="text-sm font-normal text-zinc-500 dark:text-zinc-400">by {{ author }}</span>{% endif %}
    </div>
    {% if description %}<p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">{{ description }}</p>{% endif %}
    <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-xs font-medium">
        {{ slot }}
    </div>
</div>
