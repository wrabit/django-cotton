<c-vars
    name=""
    :value="None"
    variant="default"
    class=""
/>

<fieldset
    x-data='radio("{{ name }}", {{ value|json_encode }})'
    role="radiogroup"
    data-variant="{{ variant }}"
    {% if variant == 'default' %}
        class="space-y-3"
    {% elif variant == 'segmented' %}
        class="inline-flex"
    {% elif variant == 'cards' %}
        class="flex gap-4"
    {% endif %}
    {{ attrs }}
>
    <div
        {% if variant == 'default' %}
            class="space-y-3 {{ class }}"
        {% elif variant == 'segmented' %}
            class="inline-flex rounded-lg border border-zinc-200 dark:border-zinc-700 {{ class }}"
        {% elif variant == 'cards' %}
            class="flex gap-4 w-full {{ class }}"
        {% endif %}
    >
        {{ slot }}
    </div>
</fieldset>
