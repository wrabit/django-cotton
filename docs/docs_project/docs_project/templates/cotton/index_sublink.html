<c-vars :section_id="" />

<li
    class="py-0.5 pl-4 list-none relative"
    :class="{
        'border-l-2 border-accent text-[#1a384a] dark:text-white font-semibold': isActive('{{ section_id }}'),
        'border-l text-[#1a384a] dark:text-zinc-400 border-zinc-200 dark:border-zinc-700': !isActive('{{ section_id }}')
    }"
    :aria-current="isActive('{{ section_id }}') ? 'location' : false"
>
    {{ slot }}
</li>
