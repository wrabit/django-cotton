<c-vars
    name
    value="on"
    label
    description
    description_trailing
    error
    badge
    form
    :disabled="False"
    :checked="False"
    :accent="True"
    size
/>

{% if label or description or description_trailing or error %}
    <c-ui.field
        label="{{ label }}"
        description="{{ description }}"
        description_trailing="{{ description_trailing }}"
        error="{{ error }}"
        badge="{{ badge }}"
        :form="form"
        name="{{ name }}">

        <c-ui.switch.impl
            name="{{ name }}"
            value="{{ value }}"
            :disabled="disabled"
            :checked="checked"
            :accent="accent"
            size="{{ size }}"
            :attrs="attrs"
        />
    </c-ui.field>
{% else %}
    <c-ui.switch.impl
        name="{{ name }}"
        value="{{ value }}"
        :disabled="disabled"
        :checked="checked"
        :accent="accent"
        size="{{ size }}"
        :attrs="attrs"
    />
{% endif %}
