<c-vars
    label
    description
    description_trailing
    error
    badge
    form
    name
    :inline="False"
/>

{% if label or description or description_trailing or error %}
    <c-ui.field
        variant="{% if inline %}toggle{% else %}block{% endif %}"
        label="{{ label }}"
        description="{{ description }}"
        description_trailing="{{ description_trailing }}"
        error="{{ error }}"
        badge="{{ badge }}"
        :form="form"
        name="{{ name }}">

        <c-ui.switch.impl name="{{ name }}" :attrs="attrs" />
    </c-ui.field>
{% else %}
    <c-ui.switch.impl name="{{ name }}" :attrs="attrs" />
{% endif %}
