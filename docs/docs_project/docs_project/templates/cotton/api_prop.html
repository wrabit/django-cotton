<c-vars name type :options="[]" default description />

<tr class="py-5 !border-b-zinc-200 dark:!border-b-zinc-700 text-zinc-700 dark:text-zinc-300 last:!border-b-0 last:[&>td]:!pb-2">
    <td class="md:whitespace-nowrap"><code class="!bg-accent/10 dark:!bg-accent/15 !text-accent-content text-[14px] font-bold">{{ name }}</code></td>
    <td>{{ description }}</td>
    <td>{{ type }}</td>
    <td>
        {% if options_content %}
            {{ options_content }}
        {% elif options %}
            <div class="flex flex-wrap gap-1.5">
                {% for option in options %}<code class="!bg-zinc-100 dark:!bg-zinc-700 !text-zinc-600 dark:!text-zinc-300">{{ option }}</code>{% endfor %}
            </div>
        {% else %}
            <span class="opacity-50">&mdash;</span>
        {% endif %}
    </td>
    <td>{{ default }}</td>
</tr>
