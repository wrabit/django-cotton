<c-vars
    type="text"
    name=""
    value=""
    placeholder=""
    size=""
    :disabled="False"
    :readonly="False"
    :size_classes="{
        'xs': 'text-xs py-1 px-2',
        'sm': 'text-sm py-1.5 px-3',
        '': 'text-sm py-2 px-3',
        'lg': 'text-base py-2.5 px-4',
        'xl': 'text-lg py-3 px-5'
    }"
    left_addon
    right_addon
/>

{% if left_addon or right_addon %}
    <div class="relative flex items-center">
        {% if left_addon %}
            <div class="absolute left-0 inset-y-0 flex items-center pl-3 pointer-events-none text-zinc-500 dark:text-zinc-400">
                {{ left_addon }}
            </div>
        {% endif %}

        <input
            type="{{ type }}"
            {% if name %}name="{{ name }}"{% endif %}
            {% if value %}value="{{ value }}"{% endif %}
            {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
            {% if disabled %}disabled{% endif %}
            {% if readonly %}readonly{% endif %}
            {{ attrs }}
            class="block w-full rounded-md border bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100
                   border-zinc-300 dark:border-zinc-700
                   shadow-sm
                   placeholder:text-zinc-400 dark:placeholder:text-zinc-500
                   hover:border-zinc-400 dark:hover:border-zinc-600
                   focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent
                   disabled:opacity-50 disabled:cursor-not-allowed
                   {{ size_classes|get_item:size }}
                   {% if left_addon %}pl-10{% endif %}
                   {% if right_addon %}pr-10{% endif %}"
        />

        {% if right_addon %}
            <div class="absolute right-0 inset-y-0 flex items-center pr-3 pointer-events-none text-zinc-500 dark:text-zinc-400">
                {{ right_addon }}
            </div>
        {% endif %}
    </div>
{% else %}
    <input
        type="{{ type }}"
        {% if name %}name="{{ name }}"{% endif %}
        {% if value %}value="{{ value }}"{% endif %}
        {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
        {% if disabled %}disabled{% endif %}
        {% if readonly %}readonly{% endif %}
        {{ attrs }}
        class="block w-full rounded-md border bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100
               border-zinc-300 dark:border-zinc-700
               shadow-sm
               placeholder:text-zinc-400 dark:placeholder:text-zinc-500
               hover:border-zinc-400 dark:hover:border-zinc-600
               focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent
               disabled:opacity-50 disabled:cursor-not-allowed
               {{ size_classes|get_item:size }}"
    />
{% endif %}
