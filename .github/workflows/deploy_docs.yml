name: "Deploy Documentation"
run-name: "Deploy Documentation (@${{ github.actor }})"

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      RAILWAY_PROJECT_TOKEN:
        required: true
      RAILWAY_SERVICE:
        required: true
  push:
    branches:
      - main

jobs:
  # Decide whether to deploy. On a push/merge to main, only proceed when the landing commit
  # opts in with 'deploys docs' (case-insensitive). Manual (workflow_dispatch) and called
  # (workflow_call) runs always proceed. Done in bash because GitHub expressions have no
  # case-insensitive contains. The commit message is passed via env, never interpolated into
  # the script, to avoid shell injection from an attacker-controlled message.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Gate on event and commit message
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" != "push" ] || printf '%s' "$COMMIT_MSG" | grep -qi 'deploys docs'; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy_docs:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Generate requirements.txt from pyproject
        run: |
          cd docs/docs_project
          python3 - <<'PY'
          import tomllib
          deps = tomllib.load(open("pyproject.toml", "rb"))["project"]["dependencies"]
          header = (
              "# Generated from pyproject.toml [project.dependencies] by deploy_docs.yml. Do not edit.\n"
              "# django-cotton (core) is intentionally absent: it's vendored via `cp -r` at deploy\n"
              "# (the in-repo dev copy), and its only dependency, django, is already here.\n"
          )
          open("requirements.txt", "w").write(header + "\n".join(deps) + "\n")
          PY

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Documentation Dependencies
        run: |
          cd docs/docs_project
          npm install          

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Documentation
        run: |
          cp -r django_cotton docs/docs_project
          railway up --service=${{ secrets.RAILWAY_SERVICE }}