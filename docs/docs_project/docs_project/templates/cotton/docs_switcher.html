<c-vars active="core" />

<div class="flex gap-3 mb-8 not-prose">
    <a href="{% url 'home' %}"
       class="flex-1 p-4 rounded-xl border-2 transition-all
              {% if active == 'core' %}
                  border-accent bg-accent/5 dark:bg-accent/10
              {% else %}
                  border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600 hover:bg-zinc-50 dark:hover:bg-zinc-800/50
              {% endif %}">
        <div class="flex items-center gap-2 mb-1">
            <c-icons.book class="size-4 {% if active == 'core' %}text-accent{% else %}text-zinc-400{% endif %}" />
            <span class="font-semibold text-zinc-900 dark:text-zinc-100">Core</span>
            {% if active == 'core' %}
                <span class="text-xs bg-accent/20 text-accent-content dark:text-accent px-1.5 py-0.5 rounded">You're here</span>
            {% endif %}
        </div>
        <p class="text-sm text-zinc-600 dark:text-zinc-400 mb-0">
            Build your own reusable components
        </p>
    </a>

    <a href="{% url 'ui' %}"
       class="flex-1 p-4 rounded-xl border-2 transition-all
              {% if active == 'ui' %}
                  border-accent bg-accent/5 dark:bg-accent/10
              {% else %}
                  border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600 hover:bg-zinc-50 dark:hover:bg-zinc-800/50
              {% endif %}">
        <div class="flex items-center gap-2 mb-1">
            <svg class="size-4 {% if active == 'ui' %}text-accent{% else %}text-zinc-400{% endif %}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 2a1 1 0 011 1v1h1a1 1 0 010 2H6v1a1 1 0 01-2 0V6H3a1 1 0 010-2h1V3a1 1 0 011-1zm0 10a1 1 0 011 1v1h1a1 1 0 110 2H6v1a1 1 0 11-2 0v-1H3a1 1 0 110-2h1v-1a1 1 0 011-1zm7-10a1 1 0 01.967.744L14.146 7.2 17.5 9.134a1 1 0 010 1.732l-3.354 1.935-1.18 4.455a1 1 0 01-1.933 0L9.854 12.8 6.5 10.866a1 1 0 010-1.732l3.354-1.935 1.18-4.455A1 1 0 0112 2z" clip-rule="evenodd" />
            </svg>
            <span class="font-semibold text-zinc-900 dark:text-zinc-100">UI</span>
            {% if active == 'ui' %}
                <span class="text-xs bg-accent/20 text-accent-content dark:text-accent px-1.5 py-0.5 rounded">You're here</span>
            {% endif %}
        </div>
        <p class="text-sm text-zinc-600 dark:text-zinc-400 mb-0">
            Ready-to-use UI components
        </p>
    </a>
</div>
