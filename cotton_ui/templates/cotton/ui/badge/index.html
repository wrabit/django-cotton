<c-vars
    color="zinc"
    size=""
    variant=""
    :inset="False"
    href=""
    :color_classes="{
        'zinc': 'bg-zinc-100 text-zinc-700 dark:bg-zinc-800 dark:text-zinc-300',
        'red': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',
        'orange': 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400',
        'amber': 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',
        'yellow': 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400',
        'lime': 'bg-lime-100 text-lime-700 dark:bg-lime-900/30 dark:text-lime-400',
        'green': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',
        'emerald': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400',
        'teal': 'bg-teal-100 text-teal-700 dark:bg-teal-900/30 dark:text-teal-400',
        'cyan': 'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/30 dark:text-cyan-400',
        'sky': 'bg-sky-100 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400',
        'blue': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
        'indigo': 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400',
        'violet': 'bg-violet-100 text-violet-700 dark:bg-violet-900/30 dark:text-violet-400',
        'purple': 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400',
        'fuchsia': 'bg-fuchsia-100 text-fuchsia-700 dark:bg-fuchsia-900/30 dark:text-fuchsia-400',
        'pink': 'bg-pink-100 text-pink-700 dark:bg-pink-900/30 dark:text-pink-400',
        'rose': 'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400'
    }"
    :solid_classes="{
        'zinc': 'bg-zinc-700 text-white dark:bg-zinc-300 dark:text-zinc-900',
        'red': 'bg-red-600 text-white dark:bg-red-500',
        'orange': 'bg-orange-600 text-white dark:bg-orange-500',
        'amber': 'bg-amber-600 text-white dark:bg-amber-500',
        'yellow': 'bg-yellow-600 text-white dark:bg-yellow-500',
        'lime': 'bg-lime-600 text-white dark:bg-lime-500',
        'green': 'bg-green-600 text-white dark:bg-green-500',
        'emerald': 'bg-emerald-600 text-white dark:bg-emerald-500',
        'teal': 'bg-teal-600 text-white dark:bg-teal-500',
        'cyan': 'bg-cyan-600 text-white dark:bg-cyan-500',
        'sky': 'bg-sky-600 text-white dark:bg-sky-500',
        'blue': 'bg-blue-600 text-white dark:bg-blue-500',
        'indigo': 'bg-indigo-600 text-white dark:bg-indigo-500',
        'violet': 'bg-violet-600 text-white dark:bg-violet-500',
        'purple': 'bg-purple-600 text-white dark:bg-purple-500',
        'fuchsia': 'bg-fuchsia-600 text-white dark:bg-fuchsia-500',
        'pink': 'bg-pink-600 text-white dark:bg-pink-500',
        'rose': 'bg-rose-600 text-white dark:bg-rose-500'
    }"
    :size_classes="{
        'sm': 'text-xs px-1.5 py-0.5',
        '': 'text-xs px-2 py-1',
        'lg': 'text-sm px-2.5 py-1'
    }"
/>

{% if href %}
<a
    href="{{ href }}"
    {{ attrs }}
    class="inline-flex items-center gap-1 font-medium transition-opacity hover:opacity-80 {% if variant == 'pill' %}rounded-full{% else %}rounded-md{% endif %} {{ size_classes|get_item:size }} {% if variant == 'solid' %}{{ solid_classes|get_item:color }}{% else %}{{ color_classes|get_item:color }}{% endif %} {% if inset %}{% if 'top' in inset %}-mt-1{% endif %} {% if 'bottom' in inset %}-mb-1{% endif %} {% if 'left' in inset %}-ml-1{% endif %} {% if 'right' in inset %}-mr-1{% endif %}{% endif %}"
>
    {% if icon_leading %}
        <span class="{% if size == 'sm' %}size-3{% elif size == 'lg' %}size-4{% else %}size-3{% endif %}">
            {{ icon_leading }}
        </span>
    {% endif %}
    {{ slot }}
    {% if icon_trailing %}
        <span class="{% if size == 'sm' %}size-3{% elif size == 'lg' %}size-4{% else %}size-3{% endif %}">
            {{ icon_trailing }}
        </span>
    {% endif %}
</a>
{% else %}
<span
    {{ attrs }}
    class="inline-flex items-center gap-1 font-medium {% if variant == 'pill' %}rounded-full{% else %}rounded-md{% endif %} {{ size_classes|get_item:size }} {% if variant == 'solid' %}{{ solid_classes|get_item:color }}{% else %}{{ color_classes|get_item:color }}{% endif %} {% if inset %}{% if 'top' in inset %}-mt-1{% endif %} {% if 'bottom' in inset %}-mb-1{% endif %} {% if 'left' in inset %}-ml-1{% endif %} {% if 'right' in inset %}-mr-1{% endif %}{% endif %}"
>
    {% if icon_leading %}
        <span class="{% if size == 'sm' %}size-3{% elif size == 'lg' %}size-4{% else %}size-3{% endif %}">
            {{ icon_leading }}
        </span>
    {% endif %}
    {{ slot }}
    {% if icon_trailing %}
        <span class="{% if size == 'sm' %}size-3{% elif size == 'lg' %}size-4{% else %}size-3{% endif %}">
            {{ icon_trailing }}
        </span>
    {% endif %}
</span>
{% endif %}
