<c-vars
    type="text"
    class=""
    left_addon=""
    right_addon=""
    placeholder=""
/>
<div
    class="flex
        flex-grow
        items-center
        border-gray-300
        bg-white
        dark:bg-transparent
        dark:text-white
        shadow-sm
        rounded
        ring-1 ring-gray-400 ring-opacity-40 focus-within:ring-2 focus-within:ring-tel-600
    "
>
    {% if left_addon %}
        <div class="flex flex-shrink-0 pl-3 self-stretch items-center bg-gray100 border-gray300 rounded-l">
            {{ left_addon }}
        </div>
    {% endif %}

    <input
        type="{{ type }}"
        placeholder="{{ placeholder }}"
        class="flex-grow px-3.5 py-1.5 {% if not left_addon %}rounded-l{% endif %} {% if not right_addon %}rounded-r{% endif %} bg-transparent w-full border-0 focus:outline-none focus:ring-0 {{ class }}"
        {{ attrs }}
    >

    {% if right_addon %}
        <div class="flex-shrink-0 px-3 py-2 bg-gray-100 border-l border-gray-300 rounded-r">
            {{ right_addon }}
        </div>
    {% endif %}
</div>
