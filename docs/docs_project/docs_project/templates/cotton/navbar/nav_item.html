<c-vars url :active-exact="False" :active-startswith="False" />

<a
    href="{{ url }}"
    class="px-0 py-2 text-m border-b-[3px] mb-[-3px] h-full flex items-center
    {% if active_startswith and request.path|startswith:url or active_exact and request.path == url %}
        text-zinc-800 font-semibold dark:text-white darkbg-zinc-500/30 border-teal-600
    {%  else %}
        dark:text-zinc-3x400 text-zinc-500/50 border-transparent
    {% endif %}
">
    {{ slot }}
</a>
