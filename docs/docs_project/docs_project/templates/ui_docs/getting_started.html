<c-layouts.ui>
    <h1 id="components">Modern UI Components for Django</h1>




    <div class="prose text-gray-800 ">

        <h1>Button</h1>
        <c-ui.button variant="primary" size="md">
            Click me
        </c-ui.button>

        <h1>Datepicker</h1>
        <c-ui.datepicker />

        <h1>Accordion</h1>
        <c-ui.accordion>
            <c-ui.accordion.step>
                What is Pines?
                <c-slot name="content">
                    This is a test
                </c-slot>
            </c-ui.accordion.step>
            <c-ui.accordion.step>
                What is Pines?
                <c-slot name="content">
                    This is a test
                </c-slot>
            </c-ui.accordion.step>
            <c-ui.accordion.step>
                What is Pines?
                <c-slot name="content">
                    This is a test
                </c-slot>
            </c-ui.accordion.step>
        </c-ui.accordion>

        <h1>Slideover</h1>
        <c-ui.slideover>
            <button @click="slideOverOpen=true" class="inline-flex items-center justify-center h-10 px-4 py-2 text-sm font-medium transition-colors bg-white border rounded-md hover:bg-neutral-100 active:bg-white focus:bg-white focus:outline-none focus:ring-2 focus:ring-neutral-200/60 focus:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none">Open</button>

            <c-slot name="content">
                <c-ui.input type="text" />
                <c-ui.input type="text" />
                <c-ui.input type="text" />
            </c-slot>
        </c-ui.slideover>

    </div>
</c-layouts.ui>
