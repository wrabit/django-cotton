version: '3'

services:
  cotton-docs-web:
    container_name: cotton-docs-web
    restart: always
    image: cotton-docs-app
    working_dir: /app
    # Generates cotton-ui.sources.css once (Django + kit live here), then re-runs it when the
    # kit's compiled CSS changes. The tailwind container only consumes the file.
    command: >
      /bin/sh -c "pip install -q watchfiles &&
      python manage.py cotton_ui_sources &&
      (watchfiles 'python manage.py cotton_ui_sources' django_cotton_ui/static/django_cotton_ui/cotton-ui.css &) &&
      python manage.py runserver 0.0.0.0:8000"
    environment:
      - DEBUG=True
      # Native FS events don't cross the macOS bind mount; force watchfiles to poll.
      - WATCHFILES_FORCE_POLLING=true
      - REDISHOST=cotton-docs-redis
      - REDISPASSWORD=password
      - REDISPORT=6379
      - REDISUSER=default
    volumes:
      - ../docs_project:/app
      - ../../django_cotton:/app/django_cotton
      - ../../../django-cotton-ui/django_cotton_ui:/app/django_cotton_ui
    ports:
      - 8002:8000

  cotton-docs-tailwind:
    container_name: cotton-docs-tailwind
    stop_signal: SIGINT
    image: node:20
    working_dir: /app
    tty: true
    # No kit mount: the build only consumes cotton-ui.sources.css, like a real consumer.
    volumes:
      - ../docs_project:/app
    environment:
      # Native FS events don't cross the macOS bind mount; force watchfiles to poll.
      - WATCHFILES_FORCE_POLLING=true
    # Wait for the web container to write the sources file, then build. Calls tailwindcss
    # directly, not `npm run build`, since the prebuild step needs Django.
    command: >
      /bin/sh -c "trap 'exit' INT;
      npm install &&
      apt-get update -qq && apt-get install -y -qq python3-pip >/dev/null &&
      pip install --break-system-packages -q watchfiles &&
      until [ -f cotton-ui.sources.css ]; do echo 'waiting for cotton-ui.sources.css...'; sleep 1; done &&
      npx @tailwindcss/cli -i app.css -o docs_project/static/app.css &&
      watchfiles 'npx @tailwindcss/cli -i app.css -o docs_project/static/app.css' app.css docs_project/templates cotton-ui.sources.css"

  # Kit-maintainer role: recompile the kit's CSS artifact from src/css on change, the same thing
  # a republish would produce. The web/tailwind containers still only consume the built artifact,
  # so the consumer simulation is intact. Uses watchfiles (polling) to re-run the one-shot
  # `build:css` because tailwind --watch's native FS events don't cross the macOS bind mount.
  cotton-docs-kit-watch:
    container_name: cotton-docs-kit-watch
    image: node:20
    working_dir: /kit/src
    tty: true
    environment:
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ../../../django-cotton-ui:/kit
      # Anonymous volume masks the host node_modules so npm installs Linux-native binaries
      # (tailwind's oxide/lightningcss) instead of reusing the host's macOS build.
      - /kit/src/node_modules
    command: >
      /bin/sh -c "npm install &&
      apt-get update -qq && apt-get install -y -qq python3-pip >/dev/null &&
      pip install --break-system-packages -q watchfiles &&
      npm run build:css &&
      watchfiles 'npm run build:css' css"

  cotton-docs-redis:
    container_name: cotton-docs-redis
    image: redis/redis-stack-server:latest
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --requirepass password
    restart: always
    environment:
      - REDIS_ARGS=--requirepass password
    ports:
      - "6380:6379"
    volumes:
      - cotton-docs-redis-data:/data

volumes:
  cotton-docs-redis-data: