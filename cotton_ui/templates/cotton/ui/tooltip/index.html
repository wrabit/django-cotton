<c-vars
    position="top"
    :offset="4"
    content
    :interactive="False"
/>

<div
    x-data="{
        open: false,
        hoverState: { trigger: false, tooltip: false },
        hideTimeout: null,
        tooltipPosition: { x: 0, y: 0 },
        enterTrigger() {
            this.hoverState.trigger = true;
            this.checkOpen();
        },
        leaveTrigger() {
            this.hoverState.trigger = false;
            this.checkClose();
        },
        enterTooltip() {
            this.hoverState.tooltip = true;
            this.checkOpen();
        },
        leaveTooltip() {
            this.hoverState.tooltip = false;
            this.checkClose();
        },
        checkOpen() {
            clearTimeout(this.hideTimeout);
            if (!this.open) {
                this.open = true;
                this.$nextTick(() => this.updatePosition());
            }
        },
        checkClose() {
            clearTimeout(this.hideTimeout);
            this.hideTimeout = setTimeout(() => {
                if (!this.hoverState.trigger && !this.hoverState.tooltip) {
                    this.open = false;
                }
            }, 80);
        },
        updatePosition() {
            if (!this.open) return;

            const trigger = this.$refs.trigger;
            const tooltip = this.$refs.tooltip;
            if (!trigger || !tooltip) return;

            const triggerRect = trigger.getBoundingClientRect();
            const tooltipRect = tooltip.getBoundingClientRect();
            const gap = {{ offset }};

            let x = 0, y = 0;

            switch ('{{ position }}') {
                case 'top':
                    x = triggerRect.left + (triggerRect.width / 2) - (tooltipRect.width / 2);
                    y = triggerRect.top - tooltipRect.height - gap;
                    break;
                case 'bottom':
                    x = triggerRect.left + (triggerRect.width / 2) - (tooltipRect.width / 2);
                    y = triggerRect.bottom + gap;
                    break;
                case 'left':
                    x = triggerRect.left - tooltipRect.width - gap;
                    y = triggerRect.top + (triggerRect.height / 2) - (tooltipRect.height / 2);
                    break;
                case 'right':
                    x = triggerRect.right + gap;
                    y = triggerRect.top + (triggerRect.height / 2) - (tooltipRect.height / 2);
                    break;
            }

            this.tooltipPosition = { x, y };
        }
    }"
    class="relative inline-block"
>
    {# Trigger Element #}
    <div
        @mouseenter="enterTrigger()"
        @mouseleave="leaveTrigger()"
        @focus="enterTrigger()"
        @blur="leaveTrigger()"
        x-ref="trigger"
        class="inline-block"
    >
        {{ slot }}
    </div>

    {# Tooltip Content #}
    <template x-teleport="body">
        <div
            x-show="open"
            x-cloak
            x-transition:enter="transition ease-out duration-100"
            x-transition:enter-start="opacity-0 scale-95"
            x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-75"
            x-transition:leave-start="opacity-100 scale-100"
            x-transition:leave-end="opacity-0 scale-95"
            x-ref="tooltip"
            role="tooltip"
            {% if interactive %}
            @mouseenter="enterTooltip()"
            @mouseleave="leaveTooltip()"
            {% endif %}
            class="fixed z-50 rounded-md bg-zinc-900 dark:bg-zinc-700 px-3 py-1.5 text-sm font-medium text-white shadow-lg {% if not interactive %}pointer-events-none{% endif %}"
            :style="`left: ${tooltipPosition.x}px; top: ${tooltipPosition.y}px;`"
        >
            {{ content }}
        </div>
    </template>
</div>
