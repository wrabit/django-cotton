<c-vars active="core" />

<div class="mb-8 not-prose px-4 py-3 rounded-xl bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-700">
    {% if active == 'core' %}
    <p class="text-sm text-zinc-600 dark:text-zinc-400 mb-0">
        <span class="font-medium text-zinc-900 dark:text-zinc-100">Core</span> — build your own reusable components.
        Looking for ready-made components?
        <a href="{% url 'ui' %}" class="text-accent-content hover:underline font-medium">Cotton UI →</a>
    </p>
    {% else %}
    <p class="text-sm text-zinc-600 dark:text-zinc-400 mb-0">
        <span class="font-medium text-zinc-900 dark:text-zinc-100">Cotton UI</span> — ready-made components.
        Want to build your own?
        <a href="{% url 'home' %}" class="text-accent-content hover:underline font-medium">Core docs →</a>
    </p>
    {% endif %}
</div>
