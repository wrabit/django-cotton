<div id="task-{{ id }}" {{ attrs }} class="flex items-center justify-between p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded mb-2 not-prose">
    <span class="text-gray-900 dark:text-gray-100">{{ title }}</span>
    <button
        hx-delete="/demo/tasks/{{ id }}/delete"
        hx-target="#task-{{ id }}"
        hx-swap="delete swap:0.5s"
        hx-confirm="Delete this task?"
        class="px-3 py-1 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors"
    >
        Delete
    </button>
</div>
