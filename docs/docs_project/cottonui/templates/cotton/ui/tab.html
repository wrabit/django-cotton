<!-- cotton/ui/tab.html -->
<c-vars name="" />

<div
  x-show="activeTab === $el.getAttribute('data-index')"
  :id="'panel-' + $el.getAttribute('data-index')"
  role="tabpanel"
  :aria-labelledby="'tab-' + $el.getAttribute('data-index')"
  x-init="$el.setAttribute('data-index', Array.from($el.parentNode.children).indexOf($el))"
  name="{{ name }}"
>
  {{ slot }}
</div>
