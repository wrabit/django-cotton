<c-vars embedded />

<div class="{% if embedded %}relative{% else %}flex flex-col{% endif %} w-full" x-data="tabs">
    <div x-init="tabs = '{{ labels }}'.split('|'); tabs_id = '{{ tabs_id }}'"></div>
    <div class="flex space-x-1 w-full text-sm px-2 py-0 text-gray-400 {% if embedded %}absolute top-0 left-0 z-10{% else %}border-b bg-gray-800 border-b-gray-700 dark:bg-gray-800{% endif %}" @tab-change.window="onTabChange">
        <template x-for="(tab, index) in tabs">
            <div
                class="pt-2.5 pb-2 px-3 cursor-pointer {% if not embedded %}border-b-2 border-transparent border-gray-500{% endif %}"
                :class="{ 'text-gray-200 {% if not embedded %}border-b-teal-500 shadow-[0px_-2px_3px_0px_rgba(0,0,0,0.1)]{% endif %}': index === active }"
                @click="updateTab(index)"
                x-text="`${tab}`"
            ></div>
        </template>
    </div>

    {{ slot }}
</div>
