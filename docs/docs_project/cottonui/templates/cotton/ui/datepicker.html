<c-vars
    label=""
    :open="False"
    :value="None"
    mode="single"
    format="MM/dd/yyyy"
    fromName=""
    toName=""
    parentClass="" />

<div
    x-ref="datePickerInput"
    x-modelable="value"
    x-data='datePicker({{ open|json_encode }}, {{ value|json_encode }}, {{ mode|json_encode }}, {{ format|json_encode }})'
    x-bind="root"
    {{ attrs.dict|merge:'class:relative' }}>
    <button type="button" x-bind="trigger"
        class="inline-flex items-center justify-start w-full min-h-10 px-3 py-2 text-sm font-normal text-left border border-zinc-300 dark:border-zinc-600 rounded-md bg-white dark:bg-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-700 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 transition-colors">
        <svg class="mr-2 h-4 w-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <template x-if="mode != 'multiple' && mode != 'range'">
            <span>
                <span x-text="value == null ? 'Pick a date' : formatDate(value)"></span>
                <input type="hidden" {{ attrs }} :value="value" />
            </span>
        </template>
        <template x-if="mode == 'multiple'">
            <span>
                <template x-if="!value">
                    <span>Select date(s)</span>
                </template>
                <template x-if="value">
                    <template x-for="(item, index) in value">
                        <span>
                            <span x-text="formatDate(item)" class="text-sm border-border mr-1"></span>
                            <input type="hidden" {{ attrs }}
                                :value="(new Date(item))?.toISOString().split('T')[0]" />
                        </span>
                    </template>
                </template>
            </span>
        </template>
        <template x-if="mode == 'range'">
            <span class="min-h-5">
                <template x-if="!value?.from && !value?.to">
                    <span>Pick a range of dates</span>
                </template>
                <template x-if="value?.from">
                    <span x-text="formatDate(value.from)"></span>
                </template>
                <template x-if="value?.to">
                    <span x-text="' - ' + formatDate(value.to)"></span>
                </template>
                <input type="hidden" name="{% if fromName %}{{ fromName }}{% else %}{{ name }}[\'from\']{% endif %}" {{ attrs }}
                    :value="(new Date(value))?.from?.toISOString().split('T')[0]" />
                <input type="hidden" name="{% if toName %}{{ toName }}{% else %}{{ name }}[\'to\']{% endif %}" {{ attrs }}
                    :value="(new Date(value))?.to?.toISOString().split('T')[0]" />
            </span>
        </template>
    </button>
    <div x-bind="calendar" x-cloak class="absolute top-full left-0 mt-2 z-50">
        <c-ui.calendar
            :required="required"
            :mode="mode"
            :selected="value"
            x-model="value"
            tabindex="0"
            class="outline-none" />
    </div>
</div>
