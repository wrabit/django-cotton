<c-vars
  position="bottom"
  align="start"
  offset="4"
  trigger_text=""
  min_width="12rem"
  :auto_position="True"
/>

<div
  x-data="dropdownMenu()"
  x-init="position = '{{ position }}'; align = '{{ align }}'; offset = {{ offset }}; responsive = {{ auto_position|lower }}; $watch('dropdownMenu', value => { if (value) positionDropdown() })"
  x-bind="root"
  @dropdown-close="close()"
  {{ attrs }}
  class="relative inline-block">

  {% if trigger %}
    <!-- Custom trigger provided via slot -->
    <div x-ref="trigger" x-bind="trigger">
      {{ trigger }}
    </div>
  {% elif trigger_text %}
    <!-- Auto-generated trigger for backwards compatibility -->
    <button
      type="button"
      x-ref="trigger"
      x-bind="trigger"
      class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium
             rounded-md border transition-colors
             border-zinc-300 dark:border-zinc-700
             bg-zinc-50 dark:bg-zinc-800
             text-zinc-700 dark:text-zinc-300
             hover:bg-zinc-100 dark:hover:bg-zinc-700
             focus:outline-none focus:ring-2 focus:ring-accent"
      aria-haspopup="true"
      :aria-expanded="dropdownMenu">
      {{ trigger_text }}
      <svg class="w-4 h-4 transition-transform" :class="{ 'rotate-180': dropdownMenu }"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
  {% else %}
    <!-- Error: No trigger provided -->
    <div class="text-red-500 text-sm">Error: Dropdown requires either 'trigger' slot or 'trigger_text' prop</div>
  {% endif %}

  <!-- Dropdown content -->
  <div
    x-ref="content"
    x-bind="content"
    x-cloak
    class="absolute z-50 rounded-lg border shadow-lg
           border-zinc-200 dark:border-zinc-700
           bg-white dark:bg-zinc-900
           max-h-[calc(100vh-4rem)] sm:max-h-[80vh]
           overflow-y-auto overflow-x-hidden
           scrollbar-thin scrollbar-thumb-zinc-400 scrollbar-track-zinc-100
           dark:scrollbar-thumb-zinc-600 dark:scrollbar-track-zinc-800"
    style="min-width: {{ min_width }}"
    role="menu"
    aria-orientation="vertical">
    {{ slot }}
  </div>
</div>
