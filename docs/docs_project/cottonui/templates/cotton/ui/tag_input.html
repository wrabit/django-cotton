<c-vars
    name
    :options="[]"
    :selected="[]"
    placeholder=""
    :max_tags="-1"
    :writable="False"
    :enable_search="False"
    :close_after_selecting="False"
/>

<div x-data="tagInput"
     x-init="
        initSelected('{{ selected|json_dumps }}');
        initOptions('{{ options|json_dumps }}');
        setMaxTags({{ max_tags }});
     "
>
    <div @click="focus()"
         @click.outside="handleBlur()"
         class="border relative border-zinc-300 dark:border-zinc-600 rounded-t shadow pt-1.5 pr-1 pl-1 pb-0 bg-white dark:bg-zinc-800"
         :class="{'rounded-b': !isOpen, 'ring-2 ring-accent': isFocused}">
        <div class="flex flex-wrap space-x-1">
            <template x-for="(tag, index) in tags" :key="index">
                <span class="inline-flex space-x-2 items-center bg-zinc-200 dark:bg-zinc-700 text-zinc-800 dark:text-zinc-200 rounded-full select-none px-3 text-sm py-0.5 mb-1.5 leading-6">
                    <span x-text="tag"></span>
                    <button @click.stop="removeTag(tag)" class="focus:outline-none" :tabindex="isFocused ? 0 : -1">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-300">
                          <path d="M5.28 4.22a.75.75 0 0 0-1.06 1.06L6.94 8l-2.72 2.72a.75.75 0 1 0 1.06 1.06L8 9.06l2.72 2.72a.75.75 0 1 0 1.06-1.06L9.06 8l2.72-2.72a.75.75 0 0 0-1.06-1.06L8 6.94 5.28 4.22Z" />
                        </svg>
                    </button>
                </span>
            </template>

            <input x-ref="input"
                   x-model="newTag"
                   class="tags-input-text text-sm flex-1 py-0.5 ml-2 mb-1.5 mt-0.5 pl-1.5 border-0 appearance-none focus:outline-none focus:ring-0 outline-none dark:bg-zinc-800 dark:text-zinc-200"
                   :placeholder="getPlaceholder"
                   @keydown="onKeyDown($event)"
                   @keydown.backspace="handleBackspace($event)"
                   @focus="handleFocus"
                   @input="handleInput"
            >

            <div x-show="isOpen"
                 class="top-[100%] left-[-1px] right-[-1px] absolute z-10 bg-white dark:bg-zinc-800 border-b border-l border-r border-zinc-300 dark:border-zinc-600 rounded-b shadow !ml-0 overflow-y-auto max-h-72">
                <template x-if="enableSearch && filteredOptions.length > 10">
                    <div class="p-2 border-b border-zinc-300 dark:border-zinc-600">
                        <input x-model="searchTerm"
                               @input="search"
                               @keydown.stop
                               class="w-full px-2 py-1 border border-zinc-300 dark:border-zinc-600 dark:bg-zinc-700 dark:text-zinc-200 rounded"
                               placeholder="Search options...">
                    </div>
                </template>
                <template x-for="(option, index) in filteredOptions" :key="index">
                    <div class="px-2 py-1 hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer"
                         :class="{'bg-zinc-100 dark:bg-zinc-700': index === highlightedIndex}"
                         @click.stop="selectOption(option)"
                         @mouseover="highlightedIndex = index">
                        <span x-text="option"></span>
                    </div>
                </template>

                <div x-show="filteredOptions.length === 0" class="px-2 py-1 text-zinc-500 dark:text-zinc-400 text-sm">
                    No options found
                    <span x-show="newTag.trim() !== '' && allowCustomTags" class="text-zinc-500 dark:text-zinc-400">, press Enter to add "<span x-text='newTag'></span>"</span>
                </div>
            </div>
        </div>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"  class="w-4 h-4 text-zinc-500 dark:text-zinc-400 right-3 absolute top-3">
          <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
        </svg>
    </div>

    <!-- Hidden multi-select input -->
    <select x-ref="hiddenSelect" :name="name" multiple style="display: none;">
        <template x-for="tag in tags" :key="tag">
            <option :value="tag" selected x-text="tag"></option>
        </template>
    </select>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('tagInput', () => ({
            isOpen: false,
            isFocused: false,
            maxTags: {{ max_tags }},
            placeholder: '{{ placeholder }}',
            tags: [],
            options: [],
            newTag: '',
            name: '{{ name }}',
            allowCustomTags: {{ writable|lower }},
            enableSearch: {{ enable_search|lower }},
            highlightedIndex: -1,
            searchTerm: '',
            closeAfterSelecting: {{ close_after_selecting|lower }},

            initSelected(selected_encoded = '') {
                let selected = JSON.parse(decodeURIComponent(selected_encoded))
                this.tags = selected !== null ? (Array.isArray(selected) ? selected : [selected]) : []

                this.$nextTick(() => this.updateHiddenSelect())
            },
            initOptions(options_encoded = '') {
                let options = JSON.parse(decodeURIComponent(options_encoded))
                this.options = options !== null ? options : []
            },
            setMaxTags(maxTags) {
                this.maxTags = maxTags
            },
            get filteredOptions() {
                return this.options
                    .filter(option =>
                        (this.searchTerm.length === 0 || option.toLowerCase().includes(this.searchTerm.toLowerCase())) &&
                        (this.newTag.length === 0 || option.toLowerCase().includes(this.newTag.toLowerCase()))
                    )
                    .filter(option => !this.tags.some(tag => tag.toLowerCase() === option.toLowerCase()))
            },
            get hasTagsRemaining() {
                return this.maxTags > 0 ? this.maxTags > this.tags.length : true
            },
            get getPlaceholder() {
                return (this.isFocused && !this.hasTagsRemaining)
                    ? 'maximum reached'
                    : this.tags.length === 0
                        ? this.placeholder
                        : ''
            },
            focus() {
                if (this.hasTagsRemaining) {
                    this.isOpen = true
                    this.$refs.input.focus()
                }
            },

            blur() {
                this.addTag()
                this.isFocused = false
            },
            selectOption(option) {
                if (this.canAddTag()) {
                    this.newTag = option
                    this.addTag()
                } else if (this.maxTags === 1) {
                    this.tags = []
                    this.newTag = option
                    this.addTag()
                }
                this.$refs.input.focus()
            },
            canAddTag() {
                return !this.maxTags || this.tags.length < this.maxTags
            },
            removeTag(tag) {
                this.tags = this.tags.filter(i => i !== tag)
                this.update()
                this.$refs.input.focus()
            },
            addTag() {
                if (this.newTag.trim() !== '') {
                    if (this.tags.includes(this.newTag.trim())) {
                        this.newTag = ''
                        this.isOpen = false
                    } else if (this.allowCustomTags || this.options.includes(this.newTag.trim())) {
                        this.tags.push(this.newTag.trim())
                        this.update()
                        this.newTag = ''
                        if (this.maxTags === 1 || this.closeAfterSelecting || !this.hasTagsRemaining) {
                            this.isOpen = false
                        }
                    }
                } else {
                    this.isOpen = false
                }
            },
            onKeyDown($event) {
                if (['Tab'].includes($event.key) && this.newTag.trim() === '') {
                    this.isFocused = false
                    this.isOpen = false
                } else if (['Enter', 'Tab'].includes($event.key) && this.newTag.trim() !== '') {
                    this.addTag()
                    $event.preventDefault()
                } else if ($event.key === 'ArrowDown') {
                    $event.preventDefault()
                    this.highlightedIndex = Math.min(this.highlightedIndex + 1, this.filteredOptions.length - 1)
                } else if ($event.key === 'ArrowUp') {
                    this.highlightedIndex = Math.max(this.highlightedIndex - 1, -1)
                    $event.preventDefault()
                } else if ($event.key === 'Enter' && this.highlightedIndex !== -1) {
                    this.selectOption(this.filteredOptions[this.highlightedIndex])
                    $event.preventDefault()
                } else if (!this.hasTagsRemaining) {
                    $event.preventDefault()
                }
            },
            handleBackspace($event) {
                if (this.newTag.trim() === '' && this.tags.length > 0) {
                    this.removeTag(this.tags[this.tags.length - 1])
                    $event.preventDefault()
                }
            },
            handleFocus() {
                if (this.hasTagsRemaining) {
                    this.isOpen = true
                }
                this.isFocused = true
            },
            handleBlur() {
                this.blur()
            },
            handleInput() {
                this.isOpen = true
                this.search()
            },
            search() {
                this.highlightedIndex = -1
            },
            update() {
                this.$dispatch('update', this.getTagsValue())
                this.updateHiddenSelect()
            },
            updateHiddenSelect() {
                const select = this.$refs.hiddenSelect
                select.innerHTML = ''
                this.tags.forEach(tag => {
                    const option = document.createElement('option')
                    option.value = tag
                    option.text = tag
                    option.selected = true
                    select.appendChild(option)
                })
            },
            getTagsValue() {
                if (this.maxTags === 1) {
                    return this.tags.length === 0 ? null : this.tags[0]
                }
                return this.tags
            }
        }))
    })
</script>
