<c-vars
    max_height="max-h-60"
/>

<div
    x-show="open"
    x-transition:enter="transition ease-out duration-100"
    x-transition:enter-start="opacity-0 translate-y-1"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-75"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-1"
    @keydown.down.prevent="highlightNext()"
    @keydown.up.prevent="highlightPrev()"
    @keydown.enter.prevent="selectHighlighted()"
    {{ attrs }}
    class="absolute z-50 w-full mt-2 rounded-lg border bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-700 shadow-lg {{ max_height }} overflow-auto text-left"
    style="display: none;"
>
    {{ slot }}

    {% comment %}Empty state{% endcomment %}
    <div x-show="filteredOptions.length === 0" class="px-3 py-6 text-center text-sm text-zinc-500 dark:text-zinc-400">
        No options found
    </div>
</div>
