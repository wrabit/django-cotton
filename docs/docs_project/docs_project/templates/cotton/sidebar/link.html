<c-vars
    default_class="border-zinc-200 dark:border-zinc-700"
    selected_class="border-accent"
/>

<li class="relative -ml-3 pl-4 py-1.5 border-l-2 {% if request.path == url %}{{ selected_class }}{% else %}{{ default_class }}{% endif %}">
    <a href="{{ url }}"
       class="block leading-tight dark:text-white dark:hover:opacity-100 text-[#1a384a]
        {% if request.path == url %}
            font-semibold
            dark:opacity-100
        {% else %}
            dark:opacity-70
        {% endif %}">
        {% if title %}
            {{ title }}
        {% else %}
            {{ slot }}
        {% endif %}
    </a>
</li>
