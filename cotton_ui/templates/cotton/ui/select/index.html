<c-vars
    label
    description
    description_trailing
    error
    badge
    form
    name
/>

{% if label or description or description_trailing or error %}
    <c-ui.field
        label="{{ label }}"
        description="{{ description }}"
        description_trailing="{{ description_trailing }}"
        error="{{ error }}"
        badge="{{ badge }}"
        :form="form"
        name="{{ name }}">

        <c-ui.select.impl name="{{ name }}" :attrs="attrs">{{ slot }}</c-ui.select.impl>
    </c-ui.field>
{% else %}
    <c-ui.select.impl name="{{ name }}" :attrs="attrs">{{ slot }}</c-ui.select.impl>
{% endif %}
