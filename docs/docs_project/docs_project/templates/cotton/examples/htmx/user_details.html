<div {{ attrs }} class="not-prose">
    <h2 class="text-2xl font-bold text-gray-900 mb-4">{{ name }}</h2>
    <p class="text-gray-600 mb-2">Email: {{ email }}</p>
    <p class="text-gray-600 mb-4">Role: {{ role }}</p>
    <button
        @click="$dispatch('close-modal')"
        class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded transition-colors"
    >
        Close
    </button>
</div>
