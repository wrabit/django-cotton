{% load static %}<html class="antialiased">
<head>
    {{ 'DOCS_HEAD'|env }}
    <title>{{ meta_title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'app.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon/favicon.svg' %}">
    <link rel="icon" type="image/png" href="{% static 'favicon/favicon.png' %}">

    <script src="{% static 'highlight/highlight.min.js' %}"></script>
    <script src="{% static 'highlight/languages/django.min.js' %}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/mask@3.x.x/dist/cdn.min.js"></script>
    <script defer src="{% static 'alpine3.min.js' %}"></script>

    <script src="{% static 'cotton-ui/cotton-ui.js' %}"></script>
    <link href="{% static 'cotton-ui/cotton-ui.css' %}" rel="stylesheet" />

    <link href="{% static 'highlight/styles/atom-one-dark.min.css' %}" rel="stylesheet" />
    <script>
        hljs.highlightAll();
    </script>

    <script>
        // On page load or when changing themes, best to add inline in `head` to avoid FOUC
        // Default to dark mode if no preference is set
        if (localStorage.theme === 'dark' || !('theme' in localStorage)) {
          document.documentElement.classList.add('dark')
        } else {
          document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        /* alpine */
        [x-cloak] { display: none }
        /* lastpass */
        div[data-lastpass-icon-root] { display: none !important }
    </style>
</head>
<body class="font-sans bg-amber-10/60 dark:bg-zinc-900 min-h-screen bg-fixed">
    <c-navbar />

    <div class="pt-[73px]">
        {{ slot }}
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('snippetTabs', () => ({
                tabs: [],
                currentTab: null,
                isCurrent(tab) {
                    return this.currentTab === tab
                },
                register(name) {
                    if (!this.tabs.includes(name)) {
                        this.tabs.push(name)
                    }
                }
            }))

            Alpine.data('scrollspy', () => ({
                activeSection: null,
                sections: [],
                scrollHandler: null,

                init() {
                    this.sections = Array.from(
                        this.$el.querySelectorAll('[data-section-id]')
                    ).map(section => ({
                        id: section.dataset.sectionId,
                        element: section
                    }));

                    // Set initial active section (hash or first)
                    if (window.location.hash) {
                        const hashId = window.location.hash.substring(1);
                        if (this.sections.some(s => s.id === hashId)) {
                            this.activeSection = hashId;
                        }
                    }
                    if (!this.activeSection && this.sections.length > 0) {
                        this.activeSection = this.sections[0].id;
                    }

                    this.setupScrollHandler();
                    this.handleHashChange();
                },

                destroy() {
                    if (this.scrollHandler) {
                        window.removeEventListener('scroll', this.scrollHandler);
                    }
                },

                setupScrollHandler() {
                    // Throttle scroll events
                    let ticking = false;

                    this.scrollHandler = () => {
                        if (!ticking) {
                            requestAnimationFrame(() => {
                                this.updateActiveSection();
                                ticking = false;
                            });
                            ticking = true;
                        }
                    };

                    window.addEventListener('scroll', this.scrollHandler, { passive: true });
                    // Initial check
                    this.updateActiveSection();
                },

                updateActiveSection() {
                    const scrollTop = window.scrollY;
                    const offset = 150; // Account for fixed header + some buffer

                    // Find the section that's currently in view
                    // We look for the last section whose top is above the offset line
                    let currentSection = this.sections[0];

                    for (const section of this.sections) {
                        const rect = section.element.getBoundingClientRect();
                        const sectionTop = rect.top + scrollTop;

                        if (sectionTop <= scrollTop + offset) {
                            currentSection = section;
                        } else {
                            break;
                        }
                    }

                    if (currentSection && currentSection.id !== this.activeSection) {
                        this.activeSection = currentSection.id;
                        this.updateHash(currentSection.id);
                    }
                },

                handleHashChange() {
                    window.addEventListener('hashchange', () => {
                        const hashId = window.location.hash.substring(1);
                        if (hashId && this.sections.some(s => s.id === hashId)) {
                            this.activeSection = hashId;
                        }
                    });
                },

                updateHash(sectionId) {
                    if (history.replaceState) {
                        history.replaceState(null, null, `#${sectionId}`);
                    } else {
                        window.location.hash = sectionId;
                    }
                },

                isActive(sectionId) {
                    return this.activeSection === sectionId;
                }
            }))

            // Global syntax preference store
            Alpine.store('syntaxPreference', localStorage.getItem('cotton-syntax-preference') || 'html');

            // Watch for changes and persist to localStorage
            Alpine.effect(() => {
                localStorage.setItem('cotton-syntax-preference', Alpine.store('syntaxPreference'));
            });
        })
    </script>
</body>
</html>
