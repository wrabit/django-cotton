<!-- @props([ 'selected' => '', 'mode' => 'single' , 'onselect' => '', "max" => null, "min" => null, "disabled" => null,
"required" => false ])-->

<c-vars
    selected=""
    mode="single"
    onselect=""
    :max="None"
    :min="None"
    :disabled="None"
    class
    required="false" />

<div x-data='calendar({{ selected|json_encode }}, "{{ mode }}", {{ disabled|json_encode }} , {{ min|json_encode }}, {{ max|json_encode }}, {{ required|json_encode }})'
    x-bind="root"
    {{ attrs.dict|merge:'class:p-3 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg shadow-sm w-[280px]' }}
    x-modelable="modeHandler.value">
    <div class="flex items-center justify-between mb-4">
        <button x-bind="previousMonthTrigger" type="button"
            class="inline-flex items-center justify-center w-7 h-7 rounded-md hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <div class="flex items-center gap-1">
            <span x-bind="monthLabel" class="text-sm font-medium text-zinc-900 dark:text-zinc-100"></span>
            <span x-bind="yearLabel" class="text-sm font-medium text-zinc-900 dark:text-zinc-100"></span>
        </div>
        <button x-bind="nextMonthTrigger" type="button"
            class="inline-flex items-center justify-center w-7 h-7 rounded-md hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
    </div>
    <!-- display days of the week -->
    <div class="grid grid-cols-7 mb-2">
        <template x-for="(day, index) in days">
            <div class="flex items-center justify-center h-9">
                <div x-text="day" class="text-xs font-medium text-zinc-500 dark:text-zinc-400"></div>
            </div>
        </template>
    </div>
    <div class="grid grid-cols-7 gap-1">
        <template x-for="blankDay in preBlankDaysInMonth">
            <div class="flex items-center justify-center h-9 w-9"></div>
        </template>
        <template x-for="(day, dayIndex) in daysInMonth" :key="dayIndex">
            <button tabindex="-1" type="button"
                x-effect="focusedDay == day && ($root.contains($focus.focused()))  && $el.focus({preventScroll: true})"
                x-text="day" :disabled="isDisabled(new Date(year, month, day))" @click="dayClicked(day);" :class="{
                        'bg-zinc-100 dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100': isToday(day) == true && isSelectedDay(day) == false && !isDisabled(new Date(year, month, day)),
                        'text-zinc-900 dark:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-700': isToday(day) == false && isSelectedDay(day) == false && !isDisabled(new Date(year, month, day)),
                        'bg-accent text-accent-foreground hover:bg-accent-content focus:bg-accent-content' : isSelectedDay(day) == true && !isDisabled(new Date(year, month, day)),
                        'text-zinc-300 dark:text-zinc-600 cursor-not-allowed': isDisabled(new Date(year, month, day)),
                        'ring-2 ring-accent ring-offset-2' : isFocusedDate(day),
                        'bg-accent/10 dark:bg-accent/20 text-accent dark:text-accent' : isRangeMiddle(new Date(year, month, day)),
                    }"
                class="flex items-center justify-center h-9 w-9 text-sm rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 disabled:cursor-not-allowed">
            </button>
        </template>
        <template x-for="blankDay in postBlankDaysInMonth">
            <div class="flex items-center justify-center h-9 w-9"></div>
        </template>
    </div>
</div>
