<c-layouts.ui>
    <c-header>
        Dropdown
        <c-slot name="subheading">
            A dropdown menu component for navigation and actions.
        </c-slot>
    </c-header>

    <c-slot name="page_index">
        <c-index-sublink><a href="#default" class="no-underline">Default</a></c-index-sublink>
        <c-index-sublink><a href="#reference" class="no-underline">Reference</a></c-index-sublink>
    </c-slot>

    <h2 id="default">Default</h2>

    <c-sample>
        <c-ui.dropdown trigger_text="Account">
            <c-ui.dropdown.item>Profile</c-ui.dropdown.item>
            <c-ui.dropdown.item>Settings</c-ui.dropdown.item>
            <c-ui.dropdown.item>Logout</c-ui.dropdown.item>
        </c-ui.dropdown>

        <c-slot name="code">
<c-snippet>{% cotton:verbatim %}{% verbatim %}
<c-ui.dropdown trigger_text="Account">
    <c-ui.dropdown.item>Profile</c-ui.dropdown.item>
    <c-ui.dropdown.item>Settings</c-ui.dropdown.item>
    <c-ui.dropdown.item>Logout</c-ui.dropdown.item>
</c-ui.dropdown>
{% endverbatim %}{% endcotton:verbatim %}</c-snippet>
        </c-slot>
    </c-sample>

    <h4 id="reference">Props</h4>

    <c-api-props>
        <c-api-prop name="trigger_text" type="str" default="Select" description="The text displayed on the dropdown trigger button.">
            <c-slot name="options_content">Any text</c-slot>
        </c-api-prop>
    </c-api-props>

    <h4 class="mt-6">Slots</h4>

    <c-api-props>
        <c-api-prop name="slot (default)" type="—" default="Required" description="The dropdown menu items. Use <c-ui.dropdown.item> components."></c-api-prop>
    </c-api-props>

</c-layouts.ui>
