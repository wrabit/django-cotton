<c-vars url :active-exact="False" active-startswith />

<a
    href="{{ url }}"
    class="flex items-center px-4 py-1 rounded-full font-medium transition-colors border
    {% if active_startswith and request.path|startswith:active_startswith or active_exact and request.path == url %}
        border-accent bg-accent/15 text-accent-content dark:bg-accent/20 dark:text-accent
    {% else %}
        border-transparent text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800
    {% endif %}
">
    {{ slot }}
</a>
