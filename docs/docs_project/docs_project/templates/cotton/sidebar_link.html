<c-vars
    default_class="border-transparent"
    selected_class="border-teal-600"
/>

<li class="relative my-1 pl-4 border-l-[3px] {% if request.path == url %}{{ selected_class }}{% else %}{{ default_class }}{% endif %}">
    <a href="{{ url }}"
       class="dark:text-white dark:hover:opacity-100 text-[#1a384a]
        {% if request.path == url %}
            font-semibold
            dark:opacity-100
        {% else %}
            dark:opacity-70
        {% endif %}">
        {% if title %}
            {{ title }}
        {% else %}
            {{ slot }}
        {% endif %}
    </a>
</li>
