<c-vars
    name=""
    placeholder="Select an option"
    value=""
    :required="False"
    :disabled="False"
    size=""
    :size_classes="{
        'sm': 'text-sm px-3 py-1.5 pr-10',
        '': 'text-sm px-3 py-2 pr-10',
        'lg': 'text-base px-4 py-2.5 pr-12'
    }"
/>

<select
    name="{{ name }}"
    {% if required %}required{% endif %}
    {% if disabled %}disabled{% endif %}
    {{ attrs }}
    class="w-full rounded-lg border transition-colors appearance-none bg-[right_0.5rem_center] bg-no-repeat
           {{ size_classes|get_item:size }}
           bg-white dark:bg-zinc-900
           border-zinc-300 dark:border-zinc-700
           hover:border-zinc-400 dark:hover:border-zinc-600
           focus:outline-none focus:ring-2 focus:ring-accent
           disabled:opacity-50 disabled:cursor-not-allowed
           [&>option]:text-zinc-900 [&>option]:dark:text-zinc-100 [&>option]:bg-white [&>option]:dark:bg-zinc-900"
    style="background-image: url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23999%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3e%3cpolyline points=%276 9 12 15 18 9%27%3e%3c/polyline%3e%3c/svg%3e'); background-size: 1rem;"
>
    {% if placeholder %}
    <option value="" disabled {% if not value %}selected{% endif %}>{{ placeholder }}</option>
    {% endif %}

    {{ slot }}
</select>
