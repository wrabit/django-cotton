<c-vars
    position="top"
    :positions="{
        'top': {
            'content_classes': 'bottom-full left-1/2 -translate-x-1/2 mb-3',
            'arrow_classes': 'bottom-[-3] left-1/2 -translate-x-1/2'
        },
        'bottom': {
            'content_classes': 'top-full left-1/2 -translate-x-1/2 mt-3',
            'arrow_classes': 'top-[-3] left-1/2 -translate-x-1/2'
        },
        'left': {
            'content_classes': 'right-full top-1/2 -translate-y-1/2 mr-3',
            'arrow_classes': 'right-[-3] top-1/2 -translate-y-1/2'
        },
        'right': {
            'content_classes': 'left-full top-1/2 -translate-y-1/2 ml-3',
            'arrow_classes': 'left-[-3] top-1/2 -translate-y-1/2'
        }
    }"
    theme="light"
    :themes="{
        'light': {
            'content_classes': 'bg-white text-gray-900 border border-gray-200',
            'arrow_classes': 'bg-white border border-gray-200'
        },
        'dark': {
            'content_classes': 'bg-gray-900 text-white',
            'arrow_classes': 'bg-gray-900'
        }
    }"
    size="default"
    :sizes="{
        'default': 'whitespace-nowrap',
        'sm': 'w-32',
        'md': 'w-64',
        'lg': 'w-96'
    }"
    :with_arrow="True"
/>

<span
    x-data="{open: false}"
    x-on:mouseenter="open = true"
    x-on:mouseleave="open = false"
    class="relative isolated inline-flex flex-shrink-0 w-fit"
    x-cloak
>
    {{ slot }}

    <div
        x-show="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 scale-100"
        x-transition:leave-end="opacity-0 scale-95"
        class="absolute z-2 px-3 py-2 text-sm font-medium rounded-lg shadow-sm
            {{ positions|get_item:position|get_item:'content_classes' }}
            {{ themes|get_item:theme|get_item:'content_classes' }}
            {{ sizes|get_item:size }}
            {{ class }}
    ">
        <span class="relative z-2">{{ content }}</span>
        {% if with_arrow is True %}
            <div
                class="absolute z-[0] w-3 h-3 rounded-sm rotate-45
                    {{ positions|get_item:position|get_item:'arrow_classes' }}
                    {{ themes|get_item:theme|get_item:'arrow_classes' }}
                   "
            ></div>
        {% endif %}
    </div>
</span>
