<c-vars
    variant="native"
    name
    placeholder="Select an option"
    value
    :disabled="False"
    size
    :required="False"
/>

{% if variant == "listbox" %}
    {# Rich custom select with menu component #}
    <c-ui.menu
        name="{{ name }}"
        placeholder="{{ placeholder }}"
        value="{{ value }}"
        :disabled="disabled"
        size="{{ size }}"
        :required="required"
        {{ attrs }}
    >
        {{ slot }}
    </c-ui.menu>
{% else %}
    {# Native HTML select (default) #}
    <c-ui.select.native
        name="{{ name }}"
        placeholder="{{ placeholder }}"
        value="{{ value }}"
        :disabled="disabled"
        size="{{ size }}"
        :required="required"
        {{ attrs }}
    >
        {{ slot }}
    </c-ui.select.native>
{% endif %}
