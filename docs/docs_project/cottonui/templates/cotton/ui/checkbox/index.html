<c-vars
    value=""
    label=""
    description=""
    icon=""
    name=""
    :disabled="False"
    :checked="False"
    :show_indicator="True"
    :accent="True"
/>

<label
    role="checkbox"
    data-value="{{ value }}"
    :aria-checked="isChecked('{{ value }}').toString()"
    :aria-disabled="{% if disabled %}true{% else %}false{% endif %}"
    tabindex="{% if disabled %}-1{% else %}0{% endif %}"
    @click.prevent="{% if not disabled %}toggle('{{ value }}'){% endif %}"
    @keydown.enter.stop.prevent="{% if not disabled %}toggle('{{ value }}'){% endif %}"
    @keydown.space.stop.prevent="{% if not disabled %}toggle('{{ value }}'){% endif %}"
    class="flex items-start gap-3 cursor-pointer {% if disabled %}opacity-50 cursor-not-allowed{% endif %}"
    x-bind:class="(() => {
        const variant = $el.closest('[data-variant]')?.dataset.variant || 'default';
        const classes = [];

        if (variant === 'default') {
            // Base layout classes are static, no dynamic classes needed for default
        } else if (variant === 'buttons') {
            classes.push('px-4', 'py-2', 'font-medium', 'transition-colors', 'border-r', 'border-zinc-200', 'dark:border-zinc-700', 'last:border-r-0', 'first:rounded-l-lg', 'last:rounded-r-lg');
            if ($data.isChecked('{{ value }}')) {
                classes.push('bg-zinc-100', 'dark:bg-zinc-800');
            } else {
                classes.push('hover:bg-zinc-50', 'dark:hover:bg-zinc-700');
            }
        } else if (variant === 'cards') {
            classes.push('flex', 'flex-1', 'gap-4', 'rounded-lg', 'border-2', 'p-4', 'transition-all');
            if ($data.isChecked('{{ value }}')) {
                {% if accent %}
                classes.push('border-accent', 'bg-accent/5');
                {% else %}
                classes.push('border-zinc-900', 'dark:border-zinc-100', 'bg-zinc-50', 'dark:bg-zinc-800');
                {% endif %}
            } else {
                classes.push('border-zinc-200', 'dark:border-zinc-700');
            }
        }

        return classes;
    })()"
>
    {% comment %}Hidden native checkbox input for form submission{% endcomment %}
    <input
        type="checkbox"
        name="{{ name }}"
        value="{{ value }}"
        :checked="isChecked('{{ value }}')"
        {% if disabled %}disabled{% endif %}
        class="sr-only"
    />

    {% comment %}Default variant structure{% endcomment %}
    {% if slot %}
        {{ slot }}
    {% else %}
        {% comment %}Checkbox indicator (default and cards variants only, hidden for buttons){% endcomment %}
        <div x-show="{% if show_indicator %}(() => { const v = $el.closest('[data-variant]')?.dataset.variant || 'default'; return v !== 'buttons'; })(){% else %}false{% endif %}" class="flex items-center h-5">
            <div class="flex items-center justify-center w-4 h-4 border-2 border-zinc-300 dark:border-zinc-600 rounded transition-all"
                 :class="{
                     {% if accent %}
                     'border-accent bg-accent': isChecked('{{ value }}'),
                     {% else %}
                     'border-zinc-900 dark:border-zinc-100 bg-zinc-900 dark:bg-zinc-100': isChecked('{{ value }}'),
                     {% endif %}
                     'border-zinc-300 dark:border-zinc-600': !isChecked('{{ value }}')
                 }">
                <svg class="w-3 h-3 transition-transform scale-0"
                     :class="{
                         'scale-100': isChecked('{{ value }}'),
                         'scale-0': !isChecked('{{ value }}'),
                         {% if accent %}
                         'text-accent-foreground': isChecked('{{ value }}')
                         {% else %}
                         'text-white dark:text-zinc-900': isChecked('{{ value }}')
                         {% endif %}
                     }"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
        </div>

        {% comment %}Icon for buttons variant{% endcomment %}
        {% if icon %}
            <span class="flex items-center gap-2">
                {% comment %}Icon placeholder - replace with actual icon component{% endcomment %}
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                {% if label %}{{ label }}{% endif %}
            </span>
        {% elif label %}
            <div class="flex-1">
                <div class="font-medium text-zinc-900 dark:text-zinc-100">
                    {{ label }}
                </div>
                {% if description %}
                    <div class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">
                        {{ description }}
                    </div>
                {% endif %}
            </div>
        {% endif %}
    {% endif %}
</label>
