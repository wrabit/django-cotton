<c-vars
    name
    :options="[]"
    :selected="[]"
    placeholder=""
    :max_tags="-1"
    :writable="False"
    :enable_search="False"
    :close_after_selecting="False"
    label
    description
    description_trailing
    error
    badge
    form
    :disabled="False"
    :required="False"
/>

{% if label or description or description_trailing or error %}
    <c-ui.field
        label="{{ label }}"
        description="{{ description }}"
        description_trailing="{{ description_trailing }}"
        error="{{ error }}"
        badge="{{ badge }}"
        :form="form"
        name="{{ name }}">
        
        <c-ui.combobox.impl 
            name="{{ name }}"
            :options="options"
            :selected="selected"
            placeholder="{{ placeholder }}"
            :max_tags="max_tags"
            :writable="writable"
            :enable_search="enable_search"
            :close_after_selecting="close_after_selecting"
            :disabled="disabled"
            :required="required"
            {{ attrs }}
        />
    </c-ui.field>
{% else %}
    <c-ui.combobox.impl 
        name="{{ name }}"
        :options="options"
        :selected="selected"
        placeholder="{{ placeholder }}"
        :max_tags="max_tags"
        :writable="writable"
        :enable_search="enable_search"
        :close_after_selecting="close_after_selecting"
        :disabled="disabled"
        :required="required"
        {{ attrs }}
    />
{% endif %}
