version: '3'

services:
  cotton-docs-web:
    container_name: cotton-docs-web
    restart: always
    image: cotton-docs-app
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DEBUG=True
      - REDISHOST=cotton-docs-redis
      - REDISPASSWORD=password
      - REDISPORT=6379
      - REDISUSER=default
    volumes:
      - ../docs_project:/app
      - ../../django_cotton:/app/django_cotton
      - ../../../django-cotton-ui/django_cotton_ui:/app/django_cotton_ui
    ports:
      - 8002:8000

  cotton-docs-tailwind:
    container_name: cotton-docs-tailwind
    stop_signal: SIGINT
    image: node:20
    working_dir: /app
    tty: true
    volumes:
      - ../docs_project:/app
      - ../../../django-cotton-ui/django_cotton_ui:/app/django_cotton_ui
    environment:
      # Native FS events don't cross the macOS bind mount; force watchfiles to poll.
      - WATCHFILES_FORCE_POLLING=true
    command: >
      /bin/sh -c "trap 'exit' INT;
      npm install &&
      apt-get update -qq && apt-get install -y -qq python3-pip >/dev/null &&
      pip install --break-system-packages -q watchfiles &&
      npm run build &&
      watchfiles 'npm run build' app.css docs_project/templates django_cotton_ui/templates"

  cotton-docs-redis:
    container_name: cotton-docs-redis
    image: redis/redis-stack-server:latest
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --requirepass password
    restart: always
    environment:
      - REDIS_ARGS=--requirepass password
    ports:
      - "6380:6379"
    volumes:
      - cotton-docs-redis-data:/data

volumes:
  cotton-docs-redis-data: