name: Notify Telegram

on:
  issues:
    types: [opened, assigned, closed, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, closed, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: message
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          REPO="${{ github.repository }}"

          if [ "$EVENT" = "issues" ]; then
            TITLE="${{ github.event.issue.title }}"
            NUM="${{ github.event.issue.number }}"
            URL="${{ github.event.issue.html_url }}"
            AUTHOR="${{ github.event.sender.login }}"
            if [ "$ACTION" = "opened" ]; then
              MSG="[GitHub] New issue #${NUM}: ${TITLE} (by ${AUTHOR})"
            elif [ "$ACTION" = "assigned" ]; then
              ASSIGNEE="${{ github.event.assignee.login }}"
              MSG="[GitHub] Issue #${NUM} assigned to ${ASSIGNEE}: ${TITLE}"
            elif [ "$ACTION" = "closed" ]; then
              MSG="[GitHub] Issue #${NUM} closed: ${TITLE}"
            elif [ "$ACTION" = "reopened" ]; then
              MSG="[GitHub] Issue #${NUM} reopened: ${TITLE}"
            fi

          elif [ "$EVENT" = "issue_comment" ]; then
            TITLE="${{ github.event.issue.title }}"
            NUM="${{ github.event.issue.number }}"
            URL="${{ github.event.comment.html_url }}"
            AUTHOR="${{ github.event.comment.user.login }}"
            BODY=$(echo "${{ github.event.comment.body }}" | head -c 300)
            MSG="[GitHub] Comment on #${NUM} (${TITLE}) by ${AUTHOR}: ${BODY}"

          elif [ "$EVENT" = "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            NUM="${{ github.event.pull_request.number }}"
            URL="${{ github.event.pull_request.html_url }}"
            AUTHOR="${{ github.event.sender.login }}"
            if [ "$ACTION" = "opened" ]; then
              MSG="[GitHub] New PR #${NUM}: ${TITLE} (by ${AUTHOR})"
            elif [ "$ACTION" = "closed" ]; then
              MERGED="${{ github.event.pull_request.merged }}"
              if [ "$MERGED" = "true" ]; then
                MSG="[GitHub] PR #${NUM} merged: ${TITLE}"
              else
                MSG="[GitHub] PR #${NUM} closed: ${TITLE}"
              fi
            elif [ "$ACTION" = "review_requested" ]; then
              MSG="[GitHub] Review requested on PR #${NUM}: ${TITLE}"
            fi

          elif [ "$EVENT" = "pull_request_review" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            NUM="${{ github.event.pull_request.number }}"
            URL="${{ github.event.review.html_url }}"
            STATE="${{ github.event.review.state }}"
            AUTHOR="${{ github.event.review.user.login }}"
            MSG="[GitHub] PR #${NUM} review (${STATE}) by ${AUTHOR}: ${TITLE}"
          fi

          MSG="${MSG}\n${URL}"
          echo "msg=${MSG}" >> $GITHUB_OUTPUT

      - name: Check if Claude-relevant
        id: check
        run: |
          EVENT="${{ github.event_name }}"
          LABELS='${{ toJSON(github.event.issue.labels.*.name) }}'
          COMMENT='${{ github.event.comment.body }}'

          SEND="false"
          ACTOR="${{ github.actor }}"

          # Skip notifications for Will's own actions
          if [ "$ACTOR" = "wrabit" ]; then
            # Only notify Will about his own actions if @claude is mentioned
            if echo "$COMMENT" | grep -qi '@claude'; then
              SEND="true"
            fi
          else
            # For non-Will actors (Claude bot, collaborators):
            # Send if issue has claude label
            if echo "$LABELS" | grep -q '"claude"'; then
              SEND="true"
            fi
            # Send PR events
            if [ "$EVENT" = "pull_request" ] || [ "$EVENT" = "pull_request_review" ]; then
              SEND="true"
            fi
            # Send if @claude mentioned
            if echo "$COMMENT" | grep -qi '@claude'; then
              SEND="true"
            fi
          fi

          echo "send=$SEND" >> $GITHUB_OUTPUT

      - name: Send to Telegram
        if: steps.check.outputs.send == 'true' && steps.message.outputs.msg != ''
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"${{ steps.message.outputs.msg }}\", \"disable_web_page_preview\": true}"
